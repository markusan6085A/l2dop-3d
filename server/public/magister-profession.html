<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Професія — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260720frameCornerAlign1" />
  </head>
  <body
    class="l2-body l2-page-city l2-city-ui-l2 l2-page-magister l2-page-magister-profession l2-page-has-fixed-nav l2-app-l2-chrome"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-magister-root">
          <div id="l2-hud-panel-mount"></div>
          <div id="l2-nav-top"></div>

          <p class="err" id="magister-prof-load-err" hidden></p>

          <main class="l2-magister-panel" id="magister-prof-panel">
            <p class="l2-magister-back">
              <a class="l2-magister-profession-link l2-magister-profession-link--back" id="magister-prof-back" href="/magister.html"
                >← Назад до вибору професій</a
              >
            </p>
            <h1 class="l2-pers-h1" id="magister-prof-title">Професія</h1>
            <div class="l2-magister-profession-detail__body" id="magister-prof-body"></div>
            <hr class="l2-magister-profession-detail__hr" id="magister-prof-quest-hr" hidden />
            <div class="l2-magister-profession-detail__quest" id="magister-prof-quest-block" hidden></div>
            <div class="l2-magister-profession-detail__quest-hint" id="magister-prof-quest-hint" hidden>
              <p class="l2-magister-profession-detail__quest-hint-text" id="magister-prof-quest-hint-text">
                Моби для квесту знаходяться біля міста Town of Dion.
              </p>
              <button
                type="button"
                class="l2-magister-profession-confirm-btn l2-magister-profession-teleport-btn"
                id="magister-prof-teleport-dion"
              >
                Телепорт до Town of Dion
              </button>
            </div>
            <p class="err" id="magister-prof-err" hidden></p>
            <div class="l2-magister-profession-detail__actions">
              <button type="button" class="l2-magister-profession-confirm-btn" id="magister-prof-quest" hidden>
                Взяти квест на професію
              </button>
              <button type="button" class="l2-magister-profession-confirm-btn" id="magister-prof-confirm" hidden>
                Стати
              </button>
            </div>
          </main>

          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260720hudClanEmblem1"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260718layoutStable2"></script>
    <script src="/magister-profession-info-data.js"></script>
    <script src="/magister-profession-common.js"></script>
    <script src="/magister-profession-page.js"></script>
  </body>
</html>
