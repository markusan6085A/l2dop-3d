<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Тест ЛВЛ / економіка — L2DOP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260707devBoostBtnAlign1" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260707centerSolid2" />
    <link rel="stylesheet" href="/css/l2-hud-panel.css?v=24" />
    <link rel="stylesheet" href="/css/l2-app-chrome-skin.css?v=20260707centerSolid2" />
  </head>
  <body class="l2-body l2-page-city l2-city-ui-l2 l2-page-dev-boost l2-page-has-fixed-nav l2-app-l2-chrome">
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-dev-boost-root">
          <div id="l2-hud-panel-mount"></div>
          <div id="l2-nav-top"></div>

          <section class="l2-dev-boost-panel" aria-labelledby="l2-dev-boost-h1">
            <h1 class="l2-pers-h1" id="l2-dev-boost-h1">Тимчасово: ЛВЛ і економіка</h1>
            <p class="l2-dev-boost-warn">
              Лише для розробки. На сервері має бути <code>L2DOP_DEV_SELF_BOOST=1</code>. Порожнє поле — значення не
              змінюється.
            </p>
            <p class="l2-dev-boost-current" id="l2-dev-boost-current" aria-live="polite"></p>
            <p class="l2-city-stub-msg" id="l2-dev-boost-msg" hidden></p>

            <form id="l2-dev-boost-form" class="l2-dev-boost-form">
              <div class="l2-dev-boost-field">
                <label class="lbl-l2" for="l2-dev-boost-lvl">Рівень (1–80)</label>
                <input class="inp-l2" type="number" id="l2-dev-boost-lvl" name="level" min="1" max="80" step="1" placeholder="не змінювати" />
              </div>
              <div class="l2-dev-boost-field">
                <label class="lbl-l2" for="l2-dev-boost-adena">Адена (ціле число)</label>
                <input class="inp-l2" type="text" id="l2-dev-boost-adena" name="adena" inputmode="numeric" placeholder="не змінювати" autocomplete="off" />
              </div>
              <div class="l2-dev-boost-field">
                <label class="lbl-l2" for="l2-dev-boost-sp">SP</label>
                <input class="inp-l2" type="number" id="l2-dev-boost-sp" name="sp" min="0" max="2147483647" step="1" placeholder="не змінювати" />
              </div>
              <div class="l2-dev-boost-actions">
                <button type="submit" class="btn-l2 l2-dev-boost-submit" id="l2-dev-boost-submit">Застосувати</button>
                <a class="l2-town-btn l2-dev-boost-menu" href="/menu.html">До меню</a>
              </div>
            </form>
          </section>

          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260707navChatIcon1"></script>
    <script src="/dev-boost.js"></script>
  </body>
</html>
