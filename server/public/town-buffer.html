<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Міський бафер — L2DOP</title>
    <link rel="stylesheet" href="/styles.css?v=20260501nav7" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=7" />
    <link rel="stylesheet" href="/css/l2-hud-panel.css?v=24" />
    <link rel="stylesheet" href="/css/l2-city-222-skin.css?v=48crestR4" />
    <style>
      .l2-town-buffer-root {
        padding: 10px 10px 12px;
      }
      .l2-town-buffer-card {
        margin-top: 8px;
        background:
          linear-gradient(to bottom, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.5)),
          url('/ref/989899.png') center / 100% 100% no-repeat;
        padding: 18px 12px 14px;
      }
      .l2-town-buffer-title {
        margin: 0 0 12px;
        text-align: center;
        color: #f2ddb0;
        text-shadow: 0 1px 0 #1a1306;
        font-weight: 700;
      }
      .l2-town-buffer-row {
        display: grid;
        grid-template-columns: repeat(11, 1fr);
        gap: 5px;
        margin: 0 0 12px;
      }
      .l2-town-buffer-skill {
        display: grid;
        place-items: center;
      }
      .l2-town-buffer-skill img {
        width: 26px;
        height: 26px;
        border-radius: 3px;
        border: 1px solid rgba(197, 152, 74, 0.7);
        background: #111;
      }
      .l2-town-buffer-actions {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .l2-town-buffer-fee {
        margin: 0;
        font-size: 12px;
        color: #e4c787;
        text-shadow: 0 1px 0 #211307;
      }
      .l2-town-buffer-apply-btn {
        width: 196px;
        height: 34px;
        border: 0;
        padding: 0 14px;
        background: url('/ref/8888888.png') center / 100% 100% no-repeat;
        color: #f2deb8;
        font: 700 15px/1 'Lora', serif;
        text-shadow: 0 1px 0 #2c1b08;
        cursor: pointer;
      }
      .l2-town-buffer-apply-btn:disabled {
        filter: grayscale(0.35) brightness(0.85);
        cursor: default;
      }
      .l2-town-buffer-msg {
        margin: 0;
        min-height: 16px;
        font-size: 12px;
        color: #d7c6a2;
        text-align: center;
      }
    </style>
  </head>
  <body class="l2-body l2-page-city l2-city-ui-l2 l2-page-townlive l2-page-has-fixed-nav l2-app-l2-chrome">
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img class="l2-outer-sframe__cap-tl-img" src="/ref/19.png" alt="" width="28" height="52" decoding="async" />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img class="l2-outer-sframe__cap-tr-img" src="/ref/18.png" alt="" width="28" height="52" decoding="async" />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img class="l2-game-chrome-crest__img" src="/ref/2.png" alt="" width="40" height="40" decoding="async" />
        </div>
        <div class="l2-screen-inner l2-town-buffer-root">
          <div id="l2-hud-panel-mount"></div>
          <div id="l2-nav-top"></div>
          <p class="err" id="town-buffer-load-err" hidden></p>

          <section class="l2-town-buffer-card" id="town-buffer-card" hidden>
            <h1 class="l2-town-buffer-title">Міський бафер</h1>
            <div class="l2-town-buffer-row" id="town-buffer-row"></div>
            <div class="l2-town-buffer-actions">
              <p class="l2-town-buffer-fee" id="town-buffer-fee">Ціна: —</p>
              <button type="button" class="l2-town-buffer-apply-btn" id="town-buffer-apply-btn">Взяти баф</button>
              <p class="l2-town-buffer-msg" id="town-buffer-msg"></p>
            </div>
          </section>
          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260509city59621"></script>
    <script src="/town-buffer.js?v=20260510bufferpage1"></script>
  </body>
</html>
