<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Торговець Маммона — телепорт — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260720frameCornerAlign1" />
    <link rel="stylesheet" href="/css/l2-menu-page.css?v=3" />
    <style>
      .l2-mammon-merchant-root {
        padding: 8px 10px 14px;
      }
      .l2-mammon-merchant-head {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin: 0 0 12px;
      }
      .l2-mammon-merchant-head img {
        width: 40px;
        height: 40px;
        flex: 0 0 auto;
      }
      .l2-mammon-merchant-title {
        margin: 0;
        font-size: 15px;
        line-height: 1.35;
        font-weight: 600;
        color: #fff;
      }
      .l2-mammon-merchant-sub {
        margin: 4px 0 0;
        font-size: 12px;
        line-height: 1.4;
        color: #a89a70;
      }
      .l2-mammon-loc-label {
        margin: 0 0 8px;
        font-size: 12px;
        line-height: 1.4;
        color: #ece6d0;
      }
      .l2-mammon-loc-map-viewport {
        position: relative;
        display: block;
        width: 100%;
        max-width: 100%;
        height: min(200px, 34vh);
        min-height: 160px;
        margin: 0 0 10px;
        overflow: auto;
        border: 1px solid rgba(90, 120, 90, 0.45);
        border-radius: 4px;
        background: linear-gradient(180deg, #1a2820 0%, #0d1210 100%);
        -webkit-overflow-scrolling: touch;
      }
      .l2-mammon-loc-map-inner {
        position: relative;
        display: inline-block;
        line-height: 0;
        vertical-align: top;
      }
      .l2-mammon-loc-npc-dot {
        position: absolute;
        width: 10px;
        height: 10px;
        margin: -5px 0 0 -5px;
        border-radius: 50%;
        background: #ffd060;
        border: 1px solid #1a1510;
        box-shadow: 0 0 4px rgba(255, 208, 96, 0.8);
        pointer-events: none;
      }
      .l2-mammon-loc-cost {
        margin: 0 0 8px;
        font-size: 11px;
        line-height: 1.35;
        color: #a89a70;
      }
      .l2-mammon-loc-teleport.l2-magister-profession-confirm-btn {
        max-width: none;
        padding: 6px 12px;
        font-size: 11px;
        border-color: #6b543f;
      }
      .l2-mammon-loc-err {
        margin: 8px 0 0;
        font-size: 11px;
        line-height: 1.35;
        color: #e05050;
      }
      .l2-mammon-merchant-back {
        margin: 12px 0 0;
        padding: 0;
      }
      .l2-mammon-merchant-back__link {
        margin: 0;
        padding: 0;
        border: 0;
        background: transparent;
        font: inherit;
        font-size: 12px;
        line-height: 1.35;
        color: #bfa88a;
        text-decoration: none;
      }
      .l2-mammon-merchant-back__link:hover,
      .l2-mammon-merchant-back__link:focus {
        color: #bfa88a;
        text-decoration: underline;
        outline: none;
      }
    </style>
  </head>
  <body
    class="l2-body l2-page-city l2-city-ui-l2 l2-page-menu l2-page-mammon-merchant-loc l2-page-has-fixed-nav l2-app-l2-chrome"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-menu-root l2-mammon-merchant-root">
          <div id="l2-hud-panel-mount"></div>

          <div id="l2-nav-top"></div>

          <section class="l2-menu-panel" aria-label="Торговець Маммона — телепорт">
            <div class="l2-mammon-merchant-head">
              <img id="mammon-merchant-icon" src="/nps/38.png" width="40" height="40" alt="" />
              <div>
                <h1 class="l2-mammon-merchant-title" id="mammon-merchant-title">Merchant of Mammon</h1>
                <p class="l2-mammon-merchant-sub" id="mammon-merchant-sub">Торговець Маммона</p>
              </div>
            </div>

            <p class="l2-mammon-loc-label" id="mammon-loc-label">Завантаження карти…</p>
            <div class="l2-mammon-loc-map-viewport" id="mammon-loc-viewport" aria-label="Карта — позиція Маммона">
              <div class="l2-mammon-loc-map-inner" id="mammon-loc-inner">
                <img
                  id="mammon-loc-img"
                  class="l2-map-img"
                  src="/assets/maps/aden2.jpg"
                  alt="Карта світу"
                  width="1812"
                  height="2620"
                  draggable="false"
                />
                <div id="mammon-loc-npc-dot" class="l2-mammon-loc-npc-dot" hidden aria-hidden="true"></div>
                <div id="mammon-loc-player-dot" class="l2-map-dot" hidden aria-hidden="true"></div>
              </div>
            </div>
            <p class="l2-mammon-loc-cost">Ціна телепорту: 1 Адена</p>
            <button
              type="button"
              class="l2-magister-profession-confirm-btn l2-mammon-loc-teleport"
              id="mammon-loc-teleport-btn"
            >
              Телепорт до Торговця Маммона
            </button>
            <p class="l2-mammon-loc-err" id="mammon-loc-err" hidden></p>

            <p class="l2-mammon-merchant-back">
              <a class="l2-mammon-merchant-back__link" href="/news.html">&lt;&lt;&lt; До новин</a>
            </p>
          </section>

          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260720hudClanEmblem1"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260718layoutStable2"></script>
    <script src="/mammon-location-common.js?v=20260720hudClanEmblem1"></script>
    <script src="/mammon-merchant.js?v=20260717mammonMerchant7"></script>
  </body>
</html>
