<!DOCTYPE html>

    <style>
      body.l2-page-dungeon .l2-dungeon-head {
        margin: 0 0 8px;
        padding: 8px 10px 0;
      }
      body.l2-page-dungeon .l2-dungeon-title {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
      }
      body.l2-page-dungeon .l2-dungeon-sub {
        margin: 4px 0 0;
        font-size: 12px;
        color: #a89a70;
      }
      body.l2-page-dungeon .l2-map-viewport .l2-map-img {
        cursor: crosshair;
      }
      body.l2-page-dungeon .l2-map-zoom-btns {
        top: 2px;
        right: 2px;
        gap: 2px;
        z-index: 12;
      }
      body.l2-page-dungeon .l2-map-zoom-square {
        width: 24px;
        height: 24px;
        font-size: 14px;
        border-radius: 3px;
      }
      body.l2-page-dungeon .l2-dungeon-dot {
        position: absolute;
        width: 14px;
        height: 14px;
        margin: -7px 0 0 -7px;
        border-radius: 50%;
        background: #e83838;
        border: 2px solid #0a0a0a;
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.95),
          0 0 8px rgba(232, 56, 56, 0.75);
        pointer-events: none;
        z-index: 8;
      }
      body.l2-page-dungeon .l2-dungeon-back {
        margin: 10px 0 0;
        padding: 0 10px 12px;
      }
      body.l2-page-dungeon .l2-dungeon-back__link {
        font-size: 12px;
        color: #bfa88a;
        text-decoration: none;
      }
      body.l2-page-dungeon .l2-dungeon-back__link:hover,
      body.l2-page-dungeon .l2-dungeon-back__link:focus {
        text-decoration: underline;
        outline: none;
      }
      body.l2-page-dungeon #dungeon-mob-modal.l2-map-mob-modal {
        z-index: 500;
      }
    </style>
  </head>
