<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Продати Coin of Luck — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260720frameCornerAlign1" />
    <link rel="stylesheet" href="/css/l2-city-222-skin.css?v=20260711cityMiruTone1" />
    <style>
      .l2-market-col-root {
        padding: 8px 10px 14px;
      }
      .l2-market-col-heading {
        margin: 0 0 10px;
        text-align: center;
        font-size: 15px;
        line-height: 1.35;
        font-weight: 700;
        color: #e8c86a;
      }
      .l2-market-col-tabs {
        margin: 0 0 10px;
        text-align: center;
        font-size: 13px;
        line-height: 1.45;
        color: #fff;
      }
      .l2-market-col-tabs a {
        color: #fff;
        text-decoration: underline;
      }
      .l2-market-col-tabs span {
        color: #fff;
        font-weight: 700;
      }
      .l2-market-col-form {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 260px;
        margin: 0 auto;
      }
      .l2-market-col-field label {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
        color: #fff;
      }
      .l2-market-col-input {
        box-sizing: border-box;
        width: 100%;
        padding: 6px 8px;
        border: 1px solid rgba(100, 80, 52, 0.55);
        border-radius: 4px;
        background: #14110c;
        color: #fff;
        font: inherit;
        font-size: 14px;
      }
      .l2-market-col-btn {
        margin-top: 4px;
        padding: 6px 14px;
        border: 1px solid rgba(100, 80, 52, 0.55);
        border-radius: 4px;
        background: #1d1c1a;
        color: #fff;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
      }
      .l2-market-col-btn:disabled {
        opacity: 0.55;
        cursor: default;
      }
      .l2-market-col-msg {
        margin: 8px 0 0;
        text-align: center;
        font-size: 12px;
        color: #c9bc8c;
        min-height: 1.2em;
      }
      .l2-market-col-back {
        margin: 12px 0 0;
        text-align: center;
        font-size: 13px;
      }
      .l2-market-col-back a {
        color: #fff;
        text-decoration: underline;
      }
    </style>
  </head>
  <body
    class="l2-body l2-page-city l2-city-ui-l2 l2-page-townlive l2-page-has-fixed-nav l2-app-l2-chrome l2-nav-minimal"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-city-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img class="l2-outer-sframe__cap-tl-img" src="/ref/19.png" alt="" width="28" height="52" decoding="async" />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img class="l2-outer-sframe__cap-tr-img" src="/ref/18.png" alt="" width="28" height="52" decoding="async" />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img class="l2-game-chrome-crest__img" src="/ref/2.png" alt="" width="40" height="40" decoding="async" />
        </div>
        <div class="l2-screen-inner l2-market-col-root">
          <div class="l2-chrome-nav-column l2-townlive-column">
            <div id="l2-hud-panel-mount"></div>
            <div id="l2-nav-top"></div>

            <p class="err" id="market-coin-sell-load-err" hidden></p>

            <section id="market-coin-sell-content">
              <p class="l2-market-col-heading">Ринок Coin of Luck</p>

              <nav class="l2-market-col-tabs" aria-label="Coin of Luck">
                Coin of Luck:
                <a href="/market-coin-of-luck.html">Купити</a>
                <span aria-hidden="true">|</span>
                <span>Продати</span>
              </nav>

              <form id="market-coin-sell-form" class="l2-market-col-form">
                <div class="l2-market-col-field">
                  <label for="market-coin-sell-qty">Кількість Coin of Luck</label>
                  <input class="l2-market-col-input" id="market-coin-sell-qty" type="number" min="1" step="1" inputmode="numeric" />
                </div>
                <div class="l2-market-col-field">
                  <label for="market-coin-sell-adena">Ціна (адена)</label>
                  <input class="l2-market-col-input" id="market-coin-sell-adena" type="number" min="1" step="1" inputmode="numeric" />
                </div>
                <button type="submit" class="l2-market-col-btn" id="market-coin-sell-submit">Продати</button>
              </form>

              <p class="l2-market-col-msg" id="market-coin-sell-msg" aria-live="polite"></p>
              <p class="l2-market-col-back"><a href="/market-coin-of-luck.html">← До ринку Coin of Luck</a></p>

              <div id="l2-foot-links"></div>
            </section>

            <div id="l2-nav-bottom"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260720hudClanEmblem1"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260718layoutStable2"></script>
    <script src="/market-coin-sell.js?v=20260716marketCol1"></script>
  </body>
</html>
