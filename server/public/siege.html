<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Захоплення міста — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260718layoutStable2" />
    <link rel="stylesheet" href="/css/l2-siege-page.css?v=20260719clanSiegeStageA1" />
  </head>
  <body
    class="l2-body l2-page-siege l2-page-has-fixed-nav l2-app-l2-chrome l2-nav-minimal"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img class="l2-outer-sframe__cap-tl-img" src="/ref/19.png" alt="" width="28" height="52" decoding="async" />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img class="l2-outer-sframe__cap-tr-img" src="/ref/18.png" alt="" width="28" height="52" decoding="async" />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img class="l2-game-chrome-crest__img" src="/ref/2.png" alt="" width="40" height="40" decoding="async" />
        </div>
        <div class="l2-screen-inner l2-siege-root">
          <div class="l2-chrome-nav-column">
            <div id="l2-hud-panel-mount"></div>
            <div id="l2-nav-top"></div>
            <section class="l2-siege-panel" aria-live="polite">
              <p class="err" id="siege-load-err" hidden></p>
              <h1 class="l2-siege-title" id="siege-city-name">—</h1>
              <p class="l2-siege-line" id="siege-owner-line">—</p>
              <p class="l2-siege-line" id="siege-time-line">—</p>
              <p class="l2-siege-line" id="siege-wall-line" hidden>—</p>
              <p class="l2-siege-line" id="siege-damage-line" hidden>—</p>
              <p class="l2-siege-line" id="siege-my-damage-line" hidden>—</p>
              <ul class="l2-siege-top" id="siege-top-clans" hidden></ul>
              <p class="l2-siege-msg" id="siege-msg" hidden></p>
              <p class="l2-siege-result" id="siege-result" hidden></p>
              <div class="l2-siege-actions">
                <button type="button" class="l2-siege-btn" id="siege-attack-btn" hidden>
                  Ударити стіну
                </button>
                <button type="button" class="l2-siege-btn l2-siege-btn--secondary" id="siege-refresh-btn">
                  Оновити
                </button>
                <a class="l2-siege-btn l2-siege-btn--link" href="/city.html">Назад у місто</a>
              </div>
            </section>
            <div id="l2-nav-bottom"></div>
          </div>
        </div>
      </div>
    </div>
    <script src="/common.js?v=20260719partyHudPollOpt1"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260718layoutStable2"></script>
    <script src="/siege.js?v=20260719clanSiegeStageA1"></script>
  </body>
</html>
