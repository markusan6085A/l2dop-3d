<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Персонаж — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260501nav7" />
    <link rel="preload" as="image" href="/assets/fons_pers.jpg" />
    <link rel="stylesheet" href="/css/l2-outer-sframe.css?v=20260708globalClsAll2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260708globalClsAll2" />
    <link rel="stylesheet" href="/css/l2-hud-panel.css?v=20260712wapBars16" />
    <link rel="stylesheet" href="/css/l2-app-chrome-skin.css?v=20260712wapBars16" />
    <link rel="stylesheet" href="/css/l2-char-222-skin.css?v=20260713heroTier2" />
    <link rel="stylesheet" href="/css/l2-character-page.css?v=20260713heroTier2" />
    <link rel="stylesheet" href="/css/l2-recommend-nick-page.css?v=20260711recBlue1" />
  </head>
  <body
    class="l2-body l2-page-city l2-page-char l2-page-character l2-city-ui-l2 l2-page-has-fixed-nav l2-app-l2-chrome l2-nav-minimal"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-city-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-character-root">
          <div id="l2-hud-panel-mount"></div>
          <div id="l2-nav-top"></div>

          <p class="err" id="character-load-err" hidden></p>

          <section
            class="l2-character-panel l2-character-panel--loading"
            id="character-content"
            aria-label="Персонаж"
          >
            <h1 class="l2-character-panel__title">Мій персонаж</h1>

            <hr class="l2-pers-rule l2-character-panel__rule" />

            <p class="l2-character-panel__nick" id="character-nick">—</p>

            <div class="l2-character-panel__status-row" id="character-status-row">
              <span class="l2-character-panel__status" id="character-status">Немає статусу</span>
              <button
                type="button"
                class="l2-character-panel__edit"
                id="character-status-edit"
              >
                ред.
              </button>
              <input
                type="text"
                class="l2-character-panel__status-input"
                id="character-status-input"
                maxlength="100"
                autocomplete="off"
                aria-label="Статус профілю"
                hidden
              />
              <button
                type="button"
                class="l2-character-panel__save"
                id="character-status-save"
                hidden
              >
                Зберегти
              </button>
            </div>

            <div class="l2-character-hero-panel">
              <div class="l2-char-photo-wrap">
                <div class="l2-char-equip-frame l2-char-equip-frame--hero-only">
                  <div class="l2-char-equip-bg">
                    <img
                      class="l2-char-equip-scene"
                      src="/assets/fons_pers.jpg"
                      width="300"
                      height="220"
                      alt=""
                      decoding="async"
                      fetchpriority="high"
                    />
                    <div class="l2-char-equip-hero-stage" id="char-hero-stage" hidden>
                      <img
                        id="char-hero-img"
                        class="l2-char-equip-hero l2-char-equip-hero-overlay"
                        alt=""
                        decoding="async"
                      />
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="l2-character-stats" id="character-stats">
              <div class="l2-character-row l2-character-row--stat">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-53-25.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Рівень:</span>
                <span class="l2-character-row__val l2-character-row__val--white" id="character-level">—</span>
              </div>

              <div class="l2-character-row l2-character-row--stat">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-57.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Адена:</span>
                <span class="l2-character-row__val l2-character-row__val--white" id="character-adena">0</span>
              </div>

              <div class="l2-character-row l2-character-row--stat">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-57.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Coin of Luck:</span>
                <span class="l2-character-row__val l2-character-row__val--white" id="character-coin-luck">0</span>
              </div>

              <div class="l2-character-row l2-character-row--stat">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-57.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Досвід:</span>
                <span class="l2-character-row__val l2-character-row__val--white" id="character-exp">0</span>
              </div>

              <div class="l2-character-row l2-character-row--info">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-12.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__info">Кількість отримуваного досвіду:</span>
              </div>

              <div class="l2-character-row l2-character-row--stat">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-12.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Очки умінь:</span>
                <span class="l2-character-row__val l2-character-row__val--white" id="character-sp">0</span>
              </div>

              <div class="l2-character-row l2-character-row--stat l2-character-row--all-white">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-44.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Професія:</span>
                <span class="l2-character-row__val l2-character-row__val--white" id="character-profession">—</span>
              </div>
            </div>

            <nav class="l2-character-actions" id="character-actions" aria-label="Дії персонажа">
              <a class="l2-character-row l2-character-row--link" href="/pers.html">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-12.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Характеристики</span>
              </a>

              <button type="button" class="l2-character-row l2-character-row--link" data-stub="Уміння">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-12.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Уміння</span>
              </button>

              <button type="button" class="l2-character-row l2-character-row--link" data-stub="Мої квести">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-12.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Мої квести</span>
              </button>

              <button type="button" class="l2-character-row l2-character-row--link" data-stub="Рейтинги">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-53-25.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Рейтинги</span>
              </button>

              <button type="button" class="l2-character-row l2-character-row--link" data-stub="Досягнення">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-53-25.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Досягнення</span>
              </button>

              <button type="button" class="l2-character-row l2-character-row--link" data-stub="Щоденні завдання">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-53-14.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Щоденні завдання</span>
              </button>

              <a class="l2-character-row l2-character-row--link" href="/donate.html">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-57.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Поповнити рахунок</span>
              </a>

              <button type="button" class="l2-character-row l2-character-row--link" data-stub="Преміум-акаунт">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-12.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Преміум-акаунт</span>
              </button>

              <div
                class="l2-character-row l2-character-row--online"
                id="character-online-row"
                aria-live="polite"
              >
                <span class="l2-character-online__text" id="character-online-text">—</span>
              </div>

              <p class="l2-character-registered" id="character-registered">Рег-я: —</p>

              <h2 class="l2-character-social-title">Соціальний статус</h2>
              <table class="l2-character-social-table" width="99%">
                <tr>
                  <td class="l2-character-social-table__label">Карма</td>
                  <td class="l2-character-social-table__val" id="character-karma">0</td>
                  <td class="l2-character-social-table__gap" aria-hidden="true"></td>
                  <td class="l2-character-social-table__label l2-character-social-table__label--right">PK</td>
                  <td class="l2-character-social-table__val l2-character-social-table__val--right" id="character-pk">0</td>
                </tr>
                <tr>
                  <td class="l2-character-social-table__label">Рек.</td>
                  <td class="l2-character-social-table__val l2-character-social-table__val--rec" id="character-rec">0</td>
                  <td class="l2-character-social-table__gap" aria-hidden="true"></td>
                  <td class="l2-character-social-table__rec-action" colspan="2">
                    <a class="l2-rec-nick-link" id="character-rec-nick-link" href="/recommend-nick.html"
                      >Покрасить ник</a
                    >
                  </td>
                </tr>
                <tr>
                  <td class="l2-character-social-table__label">Убито мобів</td>
                  <td class="l2-character-social-table__val" id="character-mobs">0</td>
                  <td class="l2-character-social-table__gap" aria-hidden="true"></td>
                  <td class="l2-character-social-table__label l2-character-social-table__label--right">PvP перемог/поразок</td>
                  <td class="l2-character-social-table__val l2-character-social-table__val--right" id="character-pvp">0/0</td>
                </tr>
              </table>

              <button
                type="button"
                class="l2-character-row l2-character-row--link l2-character-row--exit"
                id="character-logout"
              >
                <span class="l2-character-row__label">Вихід</span>
              </button>
            </nav>
          </section>

          <p class="l2-city-stub-msg" id="character-stub-msg" hidden></p>

          <p class="l2-character-back-map-wrap">
            <a href="/map.html" class="l2-character-back-map" data-i18n="battle_back_map"
              >Назад на карту</a
            >
          </p>

          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260712wapBars16"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260709chat1"></script>
    <script src="/charHeroPortrait.js?v=20260713hwKnightRogue1"></script>
    <script src="/character.js?v=20260711charCls1"></script>
  </body>
</html>
