<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Торговець Маммона — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260718layoutStable2" />
    <link rel="stylesheet" href="/css/l2-menu-page.css?v=3" />
    <style>
      .l2-mammon-merchant-root {
        padding: 8px 10px 14px;
      }
      .l2-mammon-merchant-head {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin: 0 0 12px;
      }
      .l2-mammon-merchant-head img {
        width: 40px;
        height: 40px;
        flex: 0 0 auto;
      }
      .l2-mammon-merchant-title {
        margin: 0;
        font-size: 15px;
        line-height: 1.35;
        font-weight: 600;
        color: #fff;
      }
      .l2-mammon-merchant-sub {
        margin: 4px 0 0;
        font-size: 12px;
        line-height: 1.4;
        color: #a89a70;
      }
      .l2-mammon-merchant-shop {
        margin: 0 0 12px;
      }
      .l2-mammon-merchant-shop__tabs {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 14px;
        margin: 0 0 8px;
      }
      .l2-mammon-merchant-shop__tab {
        margin: 0;
        padding: 0;
        border: 0;
        background: transparent;
        font: inherit;
        font-size: 13px;
        line-height: 1.35;
        font-weight: 600;
        color: #bfa88a;
        cursor: pointer;
        text-decoration: none;
      }
      .l2-mammon-merchant-shop__tab:hover,
      .l2-mammon-merchant-shop__tab:focus {
        outline: none;
        text-decoration: underline;
      }
      .l2-mammon-merchant-shop__tab.is-active {
        color: #bfa88a;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .l2-mammon-merchant-shop__panel[hidden] {
        display: none;
      }
      .l2-mammon-merchant-shop__list {
        margin: 0;
      }
      .l2-mammon-merchant-shop__row {
        margin: 0;
        padding: 10px 0;
        border-bottom: 1px solid rgba(191, 168, 138, 0.35);
      }
      .l2-mammon-merchant-shop__row:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }
      .l2-mammon-merchant-shop__row:first-child {
        padding-top: 0;
      }
      .l2-mammon-merchant-shop__grid {
        display: grid;
        grid-template-columns: 22px minmax(0, 1fr) 62px auto;
        gap: 6px;
        align-items: center;
      }
      .l2-mammon-merchant-shop__icon {
        width: 22px;
        height: 22px;
        object-fit: contain;
        display: block;
      }
      .l2-mammon-merchant-shop__name {
        margin: 0;
        font-size: 11px;
        line-height: 1.35;
        color: #a89a70;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .l2-mammon-merchant-shop__aa {
        color: #d4c4a0;
        font-weight: 600;
      }
      .l2-mammon-merchant-shop__input {
        width: 100%;
        height: 22px;
        margin: 0;
        padding: 1px 6px;
        border: 1px solid rgba(120, 100, 70, 0.65);
        border-radius: 2px;
        background: #fff;
        color: #1a1510;
        font: inherit;
        font-size: 12px;
        line-height: 1.2;
        text-align: center;
        box-sizing: border-box;
      }
      .l2-mammon-merchant-shop__input:focus {
        outline: none;
        border-color: rgba(191, 168, 138, 0.95);
      }
      .l2-mammon-merchant-shop__btn.l2-magister-profession-confirm-btn {
        max-width: none;
        padding: 5px 10px;
        font-size: 10px;
        white-space: nowrap;
        border-color: #6b543f;
      }
      .l2-mammon-merchant-shop__err {
        margin: 4px 0 0;
        font-size: 11px;
        line-height: 1.35;
        color: #e05050;
      }
      .l2-mammon-merchant-shop__msg {
        margin: 0 0 8px;
        font-size: 11px;
        line-height: 1.35;
        color: #a89a70;
      }
      .l2-mammon-merchant-back {
        margin: 12px 0 0;
        padding: 0;
      }
      .l2-mammon-merchant-back__link {
        margin: 0;
        padding: 0;
        border: 0;
        background: transparent;
        font: inherit;
        font-size: 12px;
        line-height: 1.35;
        color: #bfa88a;
        text-decoration: none;
      }
      .l2-mammon-merchant-back__link:hover,
      .l2-mammon-merchant-back__link:focus {
        color: #bfa88a;
        text-decoration: underline;
        outline: none;
      }
    </style>
  </head>
  <body
    class="l2-body l2-page-city l2-city-ui-l2 l2-page-menu l2-page-mammon-merchant l2-page-has-fixed-nav l2-app-l2-chrome"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-menu-root l2-mammon-merchant-root">
          <div id="l2-hud-panel-mount"></div>

          <div id="l2-nav-top"></div>

          <section class="l2-menu-panel" aria-label="Торговець Маммона">
            <div class="l2-mammon-merchant-head">
              <img id="mammon-merchant-icon" src="/nps/38.png" width="40" height="40" alt="" />
              <div>
                <h1 class="l2-mammon-merchant-title" id="mammon-merchant-title">Merchant of Mammon</h1>
                <p class="l2-mammon-merchant-sub" id="mammon-merchant-sub">Торговець Маммона</p>
              </div>
            </div>

            <p class="l2-mammon-merchant-shop__msg" id="mammon-merchant-shop-msg" hidden></p>
            <div id="mammon-merchant-shop-root" aria-label="Магазин Торговця Маммона"></div>

            <p class="l2-mammon-merchant-back">
              <a class="l2-mammon-merchant-back__link" href="/map.html">&lt;&lt;&lt; До карти</a>
            </p>
          </section>

          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/l2-nav.js?v=20260718layoutStable2"></script>
    <script src="/mammon-merchant.js?v=20260717mammonMerchant10"></script>
