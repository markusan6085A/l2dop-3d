<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L2 Frame Slice Demo</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <section class="l2-frame">
      <div class="l2-header"></div>

      <div class="l2-edge l2-edge-top"></div>
      <div class="l2-edge l2-edge-right"></div>
      <div class="l2-edge l2-edge-bottom"></div>
      <div class="l2-edge l2-edge-left"></div>

      <div class="l2-corner l2-corner-tl"></div>
      <div class="l2-corner l2-corner-tr"></div>
      <div class="l2-corner l2-corner-bl"></div>
      <div class="l2-corner l2-corner-br"></div>

      <div class="l2-content">
        <!-- Тут твій контент -->
      </div>
    </section>
  </main>
