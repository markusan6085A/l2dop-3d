<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Виставити на продаж — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-item-colors.css?v=20260717itemGrade2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-city-222-skin.css?v=20260711cityMiruTone1" />
    <link rel="stylesheet" href="/css/l2-char-222-skin.css?v=20260711shopSubTabsRow1" />
    <style>
      .l2-market-sell-item-root {
        padding: 8px 10px 14px;
      }
      .l2-market-sell-item-title {
        margin: 0 0 10px;
        font-size: 14px;
        line-height: 1.35;
        font-weight: 600;
        color: #fff;
      }
      .l2-market-sell-item-divider {
        margin: 10px -10px;
        border: 0;
        border-top: 1px solid rgba(100, 80, 52, 0.45);
      }
      .l2-market-sell-item-form {
        margin-top: 0;
        display: grid;
        column-gap: 6px;
        row-gap: 8px;
        align-items: center;
        width: max-content;
        max-width: 100%;
      }
      .l2-market-sell-item-form--has-qty {
        grid-template-columns: 88px 72px 62px 72px;
      }
      .l2-market-sell-item-form--no-qty {
        grid-template-columns: 88px 72px;
      }
      .l2-market-sell-item-label {
        font-size: 13px;
        color: #fff;
        white-space: nowrap;
      }
      .l2-market-sell-item-input {
        box-sizing: border-box;
        width: 72px;
        max-width: 72px;
        margin: 0;
        padding: 2px 4px;
        border: 1px solid #888;
        border-radius: 0;
        background: #fff;
        color: #111;
        font: inherit;
        font-size: 12px;
        line-height: 1.35;
      }
      .l2-market-sell-item-qty-wrap[hidden] {
        display: none !important;
      }
      .l2-market-sell-item-actions {
        margin: 10px 0 0;
      }
      .l2-market-sell-item-actions .l2-magister-profession-confirm-btn {
        border-color: #6b543f;
      }
      .l2-market-sell-item-msg {
        margin: 8px 0 0;
        font-size: 12px;
        color: #c9bc8c;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body
    class="l2-body l2-page-city l2-city-ui-l2 l2-page-townlive l2-page-has-fixed-nav l2-app-l2-chrome l2-nav-minimal"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-city-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-market-sell-item-root">
          <div class="l2-chrome-nav-column l2-townlive-column">
            <div id="l2-hud-panel-mount"></div>
            <div id="l2-nav-top"></div>

            <p class="err" id="market-sell-item-load-err" hidden></p>

            <section id="market-sell-item-content" hidden>
              <p class="l2-market-sell-item-title">Виставити на продаж</p>

              <div id="market-sell-item-preview" class="l2-char-bag-list"></div>

              <hr class="l2-market-sell-item-divider" />

              <form id="market-sell-item-form" class="l2-market-sell-item-form l2-market-sell-item-form--no-qty">
                <span class="l2-market-sell-item-label">Аден</span>
                <input
                  class="l2-market-sell-item-input"
                  id="market-sell-item-adena"
                  type="number"
                  min="0"
                  step="1"
                  inputmode="numeric"
                  autocomplete="off"
                />
                <span
                  class="l2-market-sell-item-label l2-market-sell-item-qty-wrap"
                  id="market-sell-item-qty-label"
                >
                  Кількість
                </span>
                <input
                  class="l2-market-sell-item-input l2-market-sell-item-qty-wrap"
                  id="market-sell-item-qty"
                  type="number"
                  min="1"
                  step="1"
                  inputmode="numeric"
                  autocomplete="off"
                />
                <span class="l2-market-sell-item-label">Coin of Luck:</span>
                <input
                  class="l2-market-sell-item-input"
                  id="market-sell-item-coin"
                  type="number"
                  min="0"
                  step="1"
                  inputmode="numeric"
                  autocomplete="off"
                />
                <span
                  class="l2-market-sell-item-label l2-market-sell-item-qty-wrap"
                  id="market-sell-item-qty-label-2"
                >
                  Кількість
                </span>
                <input
                  class="l2-market-sell-item-input l2-market-sell-item-qty-wrap"
                  id="market-sell-item-qty-2"
                  type="number"
                  min="1"
                  step="1"
                  inputmode="numeric"
                  autocomplete="off"
                />
              </form>

              <hr class="l2-market-sell-item-divider" />

              <div class="l2-market-sell-item-actions">
                <button
                  type="submit"
                  form="market-sell-item-form"
                  class="l2-magister-profession-confirm-btn"
                  id="market-sell-item-submit"
                >
                  Продати
                </button>
              </div>

              <p class="l2-market-sell-item-msg" id="market-sell-item-msg" aria-live="polite"></p>

              <div id="l2-foot-links"></div>
            </section>

            <div id="l2-nav-bottom"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260717perf2"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260717perf2"></script>
    <script src="/market-sell-item.js?v=20260717marketSellItem4"></script>
  </body>
</html>
