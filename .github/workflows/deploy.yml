name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/l2dop-3d
            git fetch origin main
            # VPS = дзеркало git; dirty-файли (напр. ручний sed) не блокують деплой.
            git reset --hard origin/main
            npm ci
            npm run build
            npm run verify:world-pk-map-assets
            pm2 restart l2dop-3d
            echo "deployed $(git log -1 --oneline)"