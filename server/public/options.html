<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Опції — L2DOP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260426warmUi" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=7" />
    <link rel="stylesheet" href="/css/l2-hud-panel.css?v=24" />
    <link rel="stylesheet" href="/css/l2-app-chrome-skin.css?v=29" />
  </head>
  <body class="l2-body l2-page-city l2-page-options l2-city-ui-l2 l2-page-has-fixed-nav l2-app-l2-chrome">
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-opt-root">
          <div id="l2-hud-panel-mount"></div>

          <div id="l2-nav-top"></div>

          <h1 class="l2-pers-h1" id="opt-page-title">Опції</h1>

          <section
            class="l2-opt-lang-section"
            id="l2-opt-lang"
            aria-labelledby="opt-lang-heading"
          >
            <h2 class="l2-pers-h2" id="opt-lang-heading"></h2>
            <p class="l2-opt-lang-hint" id="opt-lang-hint"></p>
            <div class="l2-opt-lang-row">
              <button type="button" class="btn-l2" id="opt-lang-uk">
                Українська
              </button>
              <button type="button" class="btn-l2" id="opt-lang-ru">
                Русский
              </button>
            </div>
          </section>

          <p class="l2-city-stub-msg" id="options-stub-msg" hidden></p>

          <section id="l2-opt-menu" class="l2-opt-menu" aria-label="Опції">
            <!-- l2dop/img/icons: help=?, top/password/prof=petition, exit=стоп, char opt=options(монітор), pers=герой -->
            <ul class="l2-opt-list">
              <li>
                <button type="button" class="l2-opt-row l2-opt-row--gold" data-stub="Таблица Эпик-Боссов">
                  <img class="l2-opt-ico-img" src="/assets/l2dop/help.jpg" width="32" height="32" alt="" />
                  <span class="l2-opt-txt">Таблица Эпик-Боссов <span class="l2-opt-nov">(New)</span></span>
                </button>
              </li>
              <li>
                <button type="button" class="l2-opt-row l2-opt-row--gold" data-stub="Таблица Боссов">
                  <img class="l2-opt-ico-img" src="/assets/l2dop/help.jpg" width="32" height="32" alt="" />
                  <span class="l2-opt-txt">Таблица Боссов <span class="l2-opt-nov">(New)</span></span>
                </button>
              </li>
              <li>
                <button type="button" class="l2-opt-row l2-opt-row--gold" data-stub="Топ игроков">
                  <img class="l2-opt-ico-img" src="/assets/l2dop/ic_petition.jpg" width="32" height="32" alt="" />
                  <span class="l2-opt-txt">Топ игроков</span>
                </button>
              </li>
              <li>
                <button type="button" class="l2-opt-row l2-opt-row--muted" data-stub="Сменить пароль">
                  <img class="l2-opt-ico-img" src="/assets/l2dop/ic_petition.jpg" width="32" height="32" alt="" />
                  <span class="l2-opt-txt">Сменить пароль</span>
                </button>
              </li>
              <li>
                <button type="button" class="l2-opt-row l2-opt-row--muted" data-stub="Удалить персонажа">
                  <img class="l2-opt-ico-img" src="/assets/l2dop/ic_exit.jpg" width="32" height="32" alt="" />
                  <span class="l2-opt-txt">Удалить персонажа</span>
                </button>
              </li>
              <li>
                <button type="button" class="l2-opt-row l2-opt-row--gold" data-stub="Профессии">
                  <img class="l2-opt-ico-img" src="/assets/l2dop/ic_petition.jpg" width="32" height="32" alt="" />
                  <span class="l2-opt-txt">Профессии <span class="l2-opt-sub">(Узнать какой нужен предмет)</span></span>
                </button>
              </li>
              <li>
                <button type="button" class="l2-opt-row l2-opt-row--gold l2-opt-row--strong" data-stub="Новичкам">
                  <img class="l2-opt-ico-img" src="/assets/l2dop/help.jpg" width="32" height="32" alt="" />
                  <span class="l2-opt-txt">Новичкам <span class="l2-opt-sub">(Внимание)</span></span>
                </button>
              </li>
              <li>
                <button type="button" class="l2-opt-row l2-opt-row--gold" data-stub="Опции персонажа">
                  <img class="l2-opt-ico-img" src="/assets/l2dop/ic_options_ui.jpg" width="32" height="32" alt="" />
                  <span class="l2-opt-txt">Опции персонажа</span>
                </button>
              </li>
              <li>
                <button type="button" class="l2-opt-row l2-opt-row--gold" data-stub="Сменить героя">
                  <img class="l2-opt-ico-img" src="/assets/l2dop/ic_pers.jpg" width="32" height="32" alt="" />
                  <span class="l2-opt-txt">Сменить героя</span>
                </button>
              </li>
              <li>
                <button type="button" class="l2-opt-row l2-opt-row--exit" id="opt-logout">
                  <img class="l2-opt-ico-img" src="/assets/l2dop/ic_exit.jpg" width="32" height="32" alt="" />
                  <span class="l2-opt-txt">Выйти из игры</span>
                </button>
              </li>
            </ul>

            <div id="l2-foot-links"></div>
          </section>

          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js"></script>
    <script src="/options.js"></script>
  </body>
</html>
