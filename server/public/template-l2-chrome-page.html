<!DOCTYPE html>

<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>— L2WAP</title>

  <body class="l2-body l2-page-your-page l2-page-has-fixed-nav">
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <!-- @include з /partials/l2-game-chrome.html (або встав вміст тут) -->
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"

            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>

            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>

              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />

        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />

        <div class="l2-screen-inner l2-your-content-root">
  <!--
    HUD + nav: /partials/l2-chrome-nav-column.html
    Розмітка HUD: common.js → L2.getHudPanelMarkup() (+ /partials/l2-hud-panel.html для city-strip).
    Якщо є #l2-nav-bottom — автоматично legacy-minimal (як city), без рамки 222 на барах.
  -->
          <p style="color: #a08c70; padding: 1rem; margin: 0">Вміст сторінки — сюди.</p>
        </div>
