<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="page_city_title">Місто — L2DOP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260501nav7" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=7" />
    <link rel="stylesheet" href="/css/l2-hud-panel.css?v=24" />
    <link rel="stylesheet" href="/css/l2-city-222-skin.css?v=41" />
  </head>
  <body
    class="l2-body l2-page-city l2-city-ui-l2 l2-page-townlive l2-page-has-fixed-nav l2-app-l2-chrome"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-city-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-city-root">
          <div class="l2-townlive-column">
            <div id="l2-hud-panel-mount"></div>

            <div id="l2-nav-top"></div>

            <p class="err" id="city-load-err" hidden></p>

            <section
              class="l2-townlive-services"
              id="city-services"
              data-i18n-attr="aria-label:city_aria_services"
              aria-label="Місто"
              hidden
            >
              <p class="l2-city-stub-msg" id="city-stub-msg" hidden></p>

              <div class="l2-town-main">
                <button
                  type="button"
                  class="l2-town-btn"
                  data-i18n="city_btn_trade"
                  data-i18n-stub="city_btn_trade"
                >
                  Торгова площа
                </button>
                <button
                  type="button"
                  class="l2-town-btn"
                  data-i18n="city_btn_buffer"
                  data-i18n-stub="city_btn_buffer"
                >
                  Бафер
                </button>
                <button
                  type="button"
                  class="l2-town-btn"
                  data-i18n="city_btn_sellers"
                  data-i18n-stub="city_btn_sellers"
                >
                  Продавці
                </button>
                <a class="l2-town-btn" href="/teleport.html" data-i18n="city_link_teleport">Телепорт</a>
                <a class="l2-town-btn" href="/gm-shop.html" data-i18n="city_link_gm_shop">Магазин вищей</a>
                <button
                  type="button"
                  class="l2-town-btn"
                  data-i18n="city_btn_warehouse"
                  data-i18n-stub="city_btn_warehouse"
                >
                  Склад
                </button>
                <a class="l2-town-btn" href="/magister.html?npcId=30344" data-i18n="city_link_skills"
                  >Вивчити навички</a
                >
                <a class="l2-town-btn" href="/magisters.html" data-i18n="city_link_magisters">Магістри</a>
                <button
                  type="button"
                  class="l2-town-btn"
                  data-i18n="city_btn_blacksmith"
                  data-i18n-stub="city_btn_blacksmith"
                >
                  Кузнеці
                </button>
                <button
                  type="button"
                  class="l2-town-btn"
                  data-i18n="city_btn_mammon_npc"
                  data-i18n-stub="city_btn_mammon_npc"
                >
                  Торговець Маммон
                </button>
                <button
                  type="button"
                  class="l2-town-btn"
                  data-i18n="city_btn_olympiad"
                  data-i18n-stub="city_btn_olympiad"
                >
                  Менеджер Олімпіади
                </button>
                <button
                  type="button"
                  class="l2-town-btn"
                  data-i18n="city_btn_supremacy"
                  data-i18n-stub="city_btn_supremacy"
                >
                  Верховенство
                </button>
                <button
                  type="button"
                  class="l2-town-btn"
                  data-i18n="city_btn_residents"
                  data-i18n-stub="city_btn_residents"
                >
                  Усі мешканці
                </button>
              </div>

              <div id="l2-foot-links"></div>
            </section>

            <div id="l2-nav-bottom"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="/common.js"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js"></script>
    <script src="/city.js"></script>
  </body>
</html>
