<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>L2DOP</title>
  <style>
    * { box-sizing: border-box; }
    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #000;
      overflow-x: hidden;
      font-family: Georgia, "Times New Roman", serif;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .miru-home {
      position: relative;
      width: min(100vw, 684px);
      aspect-ratio: 684 / 1332;
      min-height: 100vh;
      background: #000;
      overflow: hidden;
    }
    .miru-home__bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
    .miru-home__form {
      position: absolute;
      inset: 0;
      margin: 0;
      padding: 0;
    }
    .miru-home__field,
    .miru-home__hit {
      position: absolute;
      display: block;
      border: 0;
      outline: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .miru-home__field {
      background: rgba(0, 0, 0, 0.08);
      color: #f5e8bd;
      text-align: center;
      font-size: clamp(10px, 2.1vw, 15px);
      line-height: 1;
      padding: 0 5px;
      text-shadow: 0 1px 2px #000;
      caret-color: #d8bd72;
    }
    .miru-home__field::placeholder {
      color: rgba(245, 232, 189, 0.32);
    }
    .miru-home__hit {
      cursor: pointer;
      background: transparent;
      color: transparent;
      text-decoration: none;
    }
    .miru-home__play { left: 23.1%; top: 21.17%; width: 53.8%; height: 6.15%; }
    .miru-home__nick { left: 29.7%; top: 31.23%; width: 41.0%; height: 2.65%; }
    .miru-home__pass { left: 29.7%; top: 35.74%; width: 41.0%; height: 2.65%; }
    .miru-home__login { left: 38.6%; top: 38.55%; width: 22.9%; height: 2.70%; }
    .miru-home__reg { left: 26.5%; top: 44.90%; width: 47.0%; height: 2.85%; }
    .miru-home__about { left: 26.5%; top: 49.32%; width: 47.0%; height: 2.85%; }
    .miru-home__forgot { left: 26.5%; top: 53.82%; width: 47.0%; height: 2.85%; }
    .miru-home__remember {
      position: absolute;
      left: 26.5%;
      top: 41.55%;
      width: 47%;
      height: 2.2%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      color: rgba(236, 215, 151, 0.72);
      font-size: clamp(9px, 1.9vw, 13px);
      text-shadow: 0 1px 2px #000;
      user-select: none;
    }
    .miru-home__remember input {
      width: 12px;
      height: 12px;
      margin: 0;
      accent-color: #9b7a32;
    }
    .miru-home__msg {
      position: absolute;
      left: 18%;
      top: 57.3%;
      width: 64%;
      margin: 0;
      color: #ffb1a8;
      text-align: center;
      font-size: clamp(10px, 2.1vw, 14px);
      line-height: 1.25;
      text-shadow: 0 1px 3px #000;
      pointer-events: none;
    }
    .miru-home__msg[hidden] { display: none; }
  </style>
</head>
<body>
  <main class="miru-home" aria-label="L2DOP home page">
    <img class="miru-home__bg" src="/assets/miru-page-perfect.png?v=20260704miru" alt="" decoding="async" />

    <form id="form-login" class="miru-home__form" action="#" method="post" onsubmit="return false;">
      <a class="miru-home__hit miru-home__play" href="#form-login" aria-label="Почати гру">Почати гру</a>

      <input
        id="in-login"
        class="miru-home__field miru-home__nick"
        type="text"
        name="login"
        autocomplete="username"
        placeholder="Логін"
        aria-label="Логін"
      />

      <input
        id="in-pass"
        class="miru-home__field miru-home__pass"
        type="password"
        name="password"
        autocomplete="current-password"
        placeholder="Пароль"
        aria-label="Пароль"
      />

      <button id="btn-login" class="miru-home__hit miru-home__login" type="button" aria-label="Увійти">
        Увійти
      </button>

      <label class="miru-home__remember">
        <input type="checkbox" id="auth-remember" name="remember" />
        <span>Запам’ятати мене</span>
      </label>

      <a class="miru-home__hit miru-home__reg" href="/register.html" aria-label="Реєстрація">Реєстрація</a>
      <a class="miru-home__hit miru-home__about" href="/project.html" aria-label="Про сервер">Про сервер</a>
      <a class="miru-home__hit miru-home__forgot" id="auth-forgot-pass" href="#" aria-label="Забули пароль">Забули пароль</a>

      <p class="miru-home__msg" id="login-msg" hidden></p>
    </form>
  </main>

  <script src="/common.js"></script>
  <script src="/ui-i18n.js"></script>
  <script src="/main.js?v=20260704miruHome"></script>
</body>
</html>
