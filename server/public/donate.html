<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Донат — L2WAP</title><link rel="stylesheet" href="/styles.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260717perf2" />
  </head>
  <body class="l2-body l2-page-city l2-city-ui-l2 l2-page-gm-shop l2-page-has-fixed-nav l2-app-l2-chrome">
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-char-root">
          <div id="l2-hud-panel-mount"></div>

          <div id="l2-nav-top"></div>

          <div class="l2-gm-shop" style="width: 100%; max-width: 520px; margin: 0 auto; padding: 0 4px 16px">
            <p class="l2-pers-headline">Донат</p>
            <p class="l2-gm-shop-hint">
              Підтримка сервера. Реквізити та способи оплати будуть тут пізніше.
            </p>
          </div>

          <p class="l2-city-stub-msg" id="donate-stub-msg" hidden></p>

          <div id="l2-foot-links"></div>

          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260717snap1"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260717perf2"></script>
    <script>
      (function () {
        if (window.L2 && typeof L2.mountL2Nav === 'function') {
          L2.mountL2Nav({
            onStub: function (label) {
              var el = document.getElementById('donate-stub-msg');
              if (el) {
                el.hidden = false;
                el.textContent = '«' + label + '» — заглушка, з’явиться пізніше.';
              }
            },
          });
        }
        if (window.L2 && typeof L2.mountFootLinkBar === 'function') {
          L2.mountFootLinkBar('l2-foot-links', { inset: true });
        }
        var t = localStorage.getItem('token');
        if (!t || !window.L2) {
          if (window.L2 && typeof L2.clearHudPanel === 'function') L2.clearHudPanel();
        } else {
          var cached =
            typeof L2.renderCharacterFromCache === 'function'
              ? L2.renderCharacterFromCache()
              : null;
          if (typeof L2.resyncCharacterWhenRequired === 'function') {
            L2.resyncCharacterWhenRequired()
              .then(function (snapshot) {
                if (!snapshot) return;
                if (
                  !cached ||
                  Number(snapshot.revision) !== Number(cached.revision)
                ) {
                  if (typeof L2.applyMutationSnapshot === 'function') {
                    L2.applyMutationSnapshot(snapshot);
                  }
                }
              })
              .catch(function () {});
          }
        }
      })();
    </script>
  </body>
</html>
