<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="page_clans_title">Клани — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260718layoutStable2" />
    <link rel="stylesheet" href="/css/l2-clans-page.css?v=20260718clans3" />
  </head>
  <body class="l2-body l2-page-city l2-city-ui-l2 l2-page-clans l2-page-has-fixed-nav l2-app-l2-chrome">
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-city-root">
          <div class="l2-townlive-column">
            <div id="l2-hud-panel-mount"></div>

            <div id="l2-nav-top"></div>

            <p class="err" id="clans-load-err" hidden></p>

            <section
              class="l2-clans-main"
              data-i18n-attr="aria-label:clans_section_aria"
              aria-label="Клани"
            >
              <div class="l2-clans-intro">
                <p data-i18n="clans_intro">
                  Створи власний клан, збери під своїм прапором відданих воїнів і впиши його ім’я в історію світу.
                  Разом захоплюйте замки, перемагайте могутніх ворогів і ведіть свій клан до слави.
                </p>
              </div>
              <hr class="l2-clans-divider" aria-hidden="true" />
              <p class="l2-clans-actions" id="clans-create-wrap">
                <a class="l2-town-btn" href="/clans-create.html" data-i18n="clans_btn_create">Створити Клан</a>
              </p>
              <p class="l2-clans-actions" id="clans-my-wrap" hidden>
                <a class="l2-town-btn" href="/clan-my.html" data-i18n="clans_btn_my">Мій клан</a>
              </p>
              <hr class="l2-clans-divider l2-clans-divider--muted" aria-hidden="true" />
              <ul class="l2-clans-list" id="clans-list" aria-label="Список кланів"></ul>
              <p class="l2-clans-back">
                <a class="l2-clans-back__link" href="/city.html" data-i18n="clans_back_city"
                  >&lt;&lt; Назад до міста</a
                >
              </p>
            </section>

            <div id="l2-foot-links"></div>
            <div id="l2-nav-bottom"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260718layoutStable3"></script>
    <script src="/ui-i18n.js?v=20260718clans3"></script>
    <script src="/l2-nav.js?v=20260718layoutStable2"></script>
    <script src="/clans.js?v=20260718clans3"></script>
  </body>
</html>
