<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Рекомендації — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260720hudClanEmblemBeforeNick1" />
    <link rel="stylesheet" href="/css/l2-recommend-nick-page.css?v=20260711recHint1" />
  </head>
  <body
    class="l2-body l2-page-city l2-page-recommend-nick l2-city-ui-l2 l2-page-has-fixed-nav l2-app-l2-chrome l2-nav-minimal"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-city-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-recommend-nick-root">
          <div id="l2-hud-panel-mount"></div>
          <div id="l2-nav-top"></div>

          <section class="l2-recommend-nick-panel" id="recommend-nick-self-view" aria-label="Покрасить ник">
            <h1 class="l2-recommend-nick-panel__title" id="recommend-nick-title">Покрасить ник</h1>
            <p class="l2-recommend-nick-panel__lead" id="recommend-nick-lead">Обміняй рекомендації на колір нікнейма.</p>
            <p class="l2-recommend-nick-panel__stats" id="recommend-nick-stats">Рекомендації: 0</p>
            <p class="l2-recommend-nick-panel__hint" id="recommend-nick-hint">Обміняйте 100 рекомендацій і змініть колір свого ніка.</p>
            <div class="l2-recommend-nick-colors" id="recommend-nick-colors"></div>
            <button type="button" class="l2-recommend-nick-back" id="recommend-nick-back">← Назад</button>
          </section>

          <section
            class="l2-recommend-nick-panel l2-recommend-nick-panel--give"
            id="recommend-nick-give-view"
            aria-label="Рекомендовать"
            hidden
          >
            <h1 class="l2-recommend-nick-panel__title" id="recommend-give-title">Рекомендовать.</h1>
            <p class="l2-recommend-nick-panel__lead" id="recommend-give-lead">1 Рек = 1 Coin of Luck.</p>
            <button type="button" class="l2-recommend-nick-action" id="recommend-give-submit">Рекомендовать</button>
            <p class="l2-recommend-nick-panel__stats" id="recommend-give-others">Твої рекомендації для інших: 0</p>
            <div class="l2-recommend-nick-givers" id="recommend-give-givers" aria-label="Хто рекомендував"></div>
            <button type="button" class="l2-recommend-nick-back" id="recommend-give-back">← Назад</button>
          </section>

          <p class="err" id="recommend-nick-err" hidden></p>
          <p class="l2-city-stub-msg" id="recommend-nick-stub" hidden></p>

          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260720hudClanEmblemBeforeNick1"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260718layoutStable2"></script>
    <script src="/recommendNickColors.js?v=20260711recNick5"></script>
    <script src="/recommend-nick.js?v=20260711recHint1"></script>
  </body>
</html>
