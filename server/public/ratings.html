<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Рейтинги — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-ratings.css?v=20260716ratings2" />
  </head>
  <body
    class="l2-body l2-page-city l2-city-ui-l2 l2-page-ratings l2-page-has-fixed-nav l2-app-l2-chrome l2-nav-minimal"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-city-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-ratings-root">
          <div id="l2-hud-panel-mount"></div>
          <div id="l2-nav-top"></div>

          <p class="err" id="ratings-load-err" hidden></p>

          <main class="l2-ratings-panel" id="ratings-content" aria-label="Рейтинги">
            <p class="l2-ratings-back">
              <a class="l2-ratings-back-link" href="/character.html">← Назад до персонажа</a>
            </p>
            <h1 class="l2-ratings-panel__title">Рейтинги</h1>

            <p class="l2-ratings-cats__head">Основні рейтинги</p>
            <div class="l2-ratings-cats" id="ratings-categories" role="tablist"></div>

            <p class="l2-ratings-loading" id="ratings-loading">Завантаження…</p>
            <h2 class="l2-ratings-type-title" id="ratings-type-title"></h2>
            <p class="l2-ratings-stub" id="ratings-stub" hidden></p>

            <div class="l2-ratings-col-head" id="ratings-col-head">
              <span>#</span>
              <span>Ім’я</span>
              <span>Професія</span>
              <span>Рів.</span>
              <span class="l2-ratings-col-head__val">Значення</span>
            </div>

            <div class="l2-ratings-list" id="ratings-list" aria-live="polite"></div>
            <div class="l2-ratings-pages" id="ratings-pages"></div>
            <p class="l2-ratings-self" id="ratings-self" hidden></p>
          </main>

          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260717perf2"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260717perf2"></script>
    <script src="/ratings-catalog.js?v=20260716ratings3"></script>
    <script src="/ratings-page.js?v=20260716ratings3"></script>
  </body>
</html>
