<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Чат — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260501nav7" />
    <link rel="stylesheet" href="/css/l2-outer-sframe.css?v=20260708globalClsAll2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260708globalClsAll2" />
    <link rel="stylesheet" href="/css/l2-hud-panel.css?v=20260712wapBars16" />
    <link rel="stylesheet" href="/css/l2-app-chrome-skin.css?v=20260712wapBars16" />
    <link rel="stylesheet" href="/css/l2-chat-page.css?v=20260717chatNews1" />
  </head>
  <body
    class="l2-body l2-page-city l2-city-ui-l2 l2-page-chat l2-page-has-fixed-nav l2-app-l2-chrome l2-nav-minimal"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-chat-root">
          <div class="l2-chrome-nav-column">
            <div id="l2-hud-panel-mount"></div>
            <div id="l2-nav-top"></div>

            <p class="err" id="chat-load-err" hidden></p>

            <section class="l2-chat-panel" id="chat-content" aria-label="Чат" hidden>
              <div class="l2-chat-tabs" role="tablist" aria-label="Канали чату">
                <div class="l2-chat-tabs__main">
                  <button type="button" class="l2-chat-tabs__btn l2-chat-tabs__btn--active" data-channel="all" id="chat-tab-all">
                    Заг
                  </button>
                  <span class="l2-chat-tabs__sep" aria-hidden="true">|</span>
                  <button type="button" class="l2-chat-tabs__btn" data-channel="trade" id="chat-tab-trade">
                    Торг
                  </button>
                  <span class="l2-chat-tabs__sep" aria-hidden="true">|</span>
                  <button type="button" class="l2-chat-tabs__btn" data-channel="my" id="chat-tab-my">Мій</button>
                </div>
                <a class="l2-chat-tabs__news" href="/news.html" id="chat-tab-news">Новости</a>
              </div>

              <label class="l2-chat-input-wrap">
                <input
                  type="text"
                  class="l2-chat-input"
                  id="chat-input"
                  maxlength="220"
                  autocomplete="off"
                  aria-label="Повідомлення"
                  placeholder="Введіть повідомлення..."
                />
              </label>

              <p class="l2-chat-reply-hint" id="chat-reply-hint" hidden>
                <span class="l2-chat-reply-hint__label">Відповідь:</span>
                <span class="l2-chat-reply-hint__name" id="chat-reply-hint-name"></span>
                <button type="button" class="l2-chat-reply-hint__cancel" id="chat-reply-cancel" aria-label="Скасувати відповідь">
                  ×
                </button>
              </p>

              <div class="l2-chat-compose-actions">
                <button type="button" class="l2-chat-send" id="chat-send-btn">Написати</button>
                <button type="button" class="l2-chat-link" id="chat-refresh-btn">Оновити</button>
                <span class="l2-chat-actions-sep" aria-hidden="true">|</span>
                <button
                  type="button"
                  class="l2-chat-link"
                  id="chat-smiles-btn"
                  aria-expanded="false"
                  aria-controls="chat-smiles-panel"
                >
                  Смайли
                </button>
              </div>

              <div class="l2-chat-smiles" id="chat-smiles-panel" hidden>
                <div class="l2-chat-smiles__grid" id="chat-smiles-grid" role="list"></div>
                <nav class="l2-chat-smiles-pager" id="chat-smiles-pager" aria-label="Сторінки смайлів" hidden>
                  <button type="button" class="l2-chat-smiles-pager__btn" id="chat-smiles-prev" aria-label="Попередня сторінка">
                    &lt;&lt;
                  </button>
                  <button type="button" class="l2-chat-smiles-pager__btn" id="chat-smiles-next" aria-label="Наступна сторінка">
                    &gt;&gt;
                  </button>
                </nav>
              </div>

              <p class="l2-city-stub-msg" id="chat-stub-msg" hidden></p>

              <div class="l2-chat-list" id="chat-messages" aria-live="polite"></div>

              <nav class="l2-chat-pages" id="chat-pages" aria-label="Сторінки чату" hidden></nav>
            </section>

            <div id="l2-nav-bottom"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260712wapBars16"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260709chat1"></script>
    <script src="/chatSmiles.js?v=20260711chatOrig5"></script>
    <script src="/chat.js?v=20260711chatSmile16"></script>
  </body>
</html>
