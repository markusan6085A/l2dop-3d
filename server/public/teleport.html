<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Телепорт — L2DOP</title><link rel="stylesheet" href="/styles.css?v=20260426warmUi" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260708globalClsAll1" />
    <link rel="stylesheet" href="/css/l2-hud-panel.css?v=24" />
    <link rel="stylesheet" href="/css/l2-app-chrome-skin.css?v=20260708globalClsAll1" />
  </head>
  <body class="l2-body l2-page-city l2-city-ui-l2 l2-page-teleport l2-page-has-fixed-nav l2-app-l2-chrome">
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-teleport-root">
          <div id="l2-hud-panel-mount"></div>

          <div id="l2-nav-top"></div>

          <p class="err" id="tp-load-err" hidden></p>

          <section class="l2-teleport-panel" id="tp-content" aria-label="Телепорт">
            <h1 class="l2-teleport-panel__title">Телепорт</h1>
            <p class="l2-teleport-panel__back">
              <a class="l2-town-btn" href="/city.html">Назад до міста</a>
            </p>
            <ul id="tp-list" class="l2-city-tp-list"></ul>
            <p class="err l2-city-tp-modal__err" id="tp-err" hidden></p>
            <p class="l2-city-stub-msg" id="tp-ok" hidden></p>
          </section>

          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260707navChatIcon1"></script>
    <script src="/teleport.js?v=20260708tpFastFirst1"></script>
  </body>
</html>
