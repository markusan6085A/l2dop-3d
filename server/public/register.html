<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Реєстрація — L2MuLti</title><link rel="stylesheet" href="/styles.css?v=20260426warmUi" />
    <link rel="stylesheet" href="/css/l2-outer-sframe.css?v=20260708globalClsAll2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260708globalClsAll2" />
    <link rel="stylesheet" href="/css/l2-app-chrome-skin.css?v=20260708globalClsAll2" />
  </head>
  <body class="l2-body l2-page-city l2-page-townlive l2-page-auth l2-app-l2-chrome">
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-city-root">
          <div class="l2-townlive-column">
            <header class="l2-city-head" aria-label="Заголовок">
              <p class="l2-city-head-tagline">Онлайн гра Lineage II</p>
              <h1 class="l2-logo">L2MuLti</h1>
            </header>

            <div class="l2-auth-back">
              <a class="btn-l2 btn-l2-secondary" href="/">← На головну</a>
            </div>

            <div class="main">
              <span class="main-inner-frame" aria-hidden="true"></span>
              <div class="main-ornament-top" aria-hidden="true"></div>
              <div class="main-ornament-bottom" aria-hidden="true"></div>
              <div class="main-corner-bl" aria-hidden="true"></div>
              <div class="main-corner-br" aria-hidden="true"></div>
              <div class="main-l2-stack">
                <div class="logo">Створення героя</div>
                <p class="desc">
                  П’ять рас Lineage II. Воїн або маг — як у Interlude (без «червоних» проф GoD). Гноми: лише воїн, магів у грі немає.
                </p>

                <hr />

                <form id="form-reg" action="#" method="post" onsubmit="return false;">
                  <label class="lbl-l2" for="reg-login">Логін (нік акаунта)</label>
                  <input id="reg-login" class="inp-l2" type="text" autocomplete="username" />

                  <label class="lbl-l2" for="reg-pass">Пароль</label>
                  <input id="reg-pass" class="inp-l2" type="password" autocomplete="new-password" />

                  <label class="lbl-l2" for="reg-pass2">Підтвердження пароля</label>
                  <input id="reg-pass2" class="inp-l2" type="password" autocomplete="new-password" />

                  <label class="lbl-l2" for="reg-hero">Ім’я персонажа</label>
                  <input id="reg-hero" class="inp-l2" type="text" autocomplete="off" maxlength="24" />

                  <label class="lbl-l2" for="reg-race">Раса</label>
                  <select id="reg-race" class="inp-l2">
                    <option value="Human">Людина</option>
                    <option value="Elf">Ельф</option>
                    <option value="Dark Elf">Темний ельф</option>
                    <option value="Orc">Орк</option>
                    <option value="Dwarf">Гном</option>
                  </select>

                  <p class="desc" style="margin-top: 10px; margin-bottom: 6px">Стать</p>
                  <div role="group" aria-label="Стать персонажа">
                    <label class="lbl-l2" style="display: block; font-weight: normal">
                      <input type="radio" name="gender" value="male" checked />
                      Чоловік
                    </label>
                    <label class="lbl-l2" style="display: block; font-weight: normal">
                      <input type="radio" name="gender" value="female" />
                      Жінка
                    </label>
                  </div>

                  <p class="desc" style="margin-top: 10px; margin-bottom: 6px">Гілка старту</p>
                  <div role="group" aria-label="Гілка класу">
                    <label class="lbl-l2" style="display: block; font-weight: normal">
                      <input type="radio" name="classBranch" value="fighter" checked />
                      Воїн
                    </label>
                    <label class="lbl-l2" id="opt-mystic" style="display: block; font-weight: normal">
                      <input type="radio" name="classBranch" value="mystic" />
                      Маг
                    </label>
                  </div>
                  <p id="reg-dwarf-class-note" class="desc" hidden>
                    Для гнома доступна лише гілка воїна.
                  </p>

                  <div class="center" style="margin-top: 16px">
                    <button type="button" id="btn-register" class="btn-l2">Створити героя</button>
                  </div>
                </form>

                <p class="err" id="reg-msg" hidden></p>
              </div>
            </div>

            <nav
              class="l2-dock l2-dock--auth"
              data-i18n-attr="aria-label:auth_dock_aria"
              aria-label="Швидкі посилання"
            >
              <a href="/" class="l2-dock-tile"><span data-i18n="auth_dock_home">Головна</span></a>
              <a href="#" class="l2-dock-tile"><span data-i18n="auth_dock_about">Про сервер</span></a>
            </nav>
          </div>
        </div>
      </div>
    </div>

    <script src="/common.js"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/register.js"></script>
  </body>
</html>
