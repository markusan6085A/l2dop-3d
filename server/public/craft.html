<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Крафт — L2DOP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260426warmUi" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=7" />
    <link rel="stylesheet" href="/css/l2-hud-panel.css?v=24" />
    <link rel="stylesheet" href="/css/l2-city-222-skin.css?v=20260705craftCity" />
    <link rel="stylesheet" href="/css/l2-craft-page.css?v=20260705craftBtn1512" />
  </head>
  <body class="l2-body l2-page-city l2-city-ui-l2 l2-page-townlive l2-page-craft l2-page-has-fixed-nav l2-app-l2-chrome">
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-craft-root">
          <div id="l2-hud-panel-mount"></div>

          <div id="l2-nav-top"></div>

          <section class="l2-craft-panel" aria-label="Крафт">
            <h1 class="l2-pers-h1">Крафт</h1>
            <p class="l2-city-stub-msg" id="l2-craft-stub-msg" hidden></p>

            <div id="l2-craft-denied" class="l2-craft-denied" hidden>
              <p class="l2-city-stub-msg">
                Крафт доступний для гнома-воїна після першої професії: Збирач (Scavenger) або Ремісник
                (Artisan). Рецепти відкриваються за рівнем.
              </p>
              <p class="l2-teleport-panel__back">
                <a class="l2-town-btn" href="/menu.html">Назад до меню</a>
              </p>
            </div>

            <div id="l2-craft-main" class="l2-craft-main" hidden>
              <p class="l2-city-stub-msg" id="l2-craft-hint">Завантаження рецептів…</p>
              <div id="l2-craft-body"></div>
              <p class="l2-teleport-panel__back">
                <a class="l2-town-btn" href="/menu.html">Назад до меню</a>
              </p>
            </div>
          </section>

          <div
            id="l2-craft-modal"
            class="l2-craft-modal"
            hidden
            aria-live="polite"
          >
            <button
              type="button"
              class="l2-craft-modal__backdrop"
              id="l2-craft-modal-backdrop"
              aria-label="Закрити"
            ></button>
            <div
              class="l2-craft-modal__panel"
              role="dialog"
              aria-modal="true"
              aria-labelledby="l2-craft-modal-title"
            >
              <button
                type="button"
                class="l2-craft-modal__close"
                id="l2-craft-modal-close"
                aria-label="Закрити"
              >
                ×
              </button>
              <div class="l2-craft-modal__head">
                <img
                  id="l2-craft-modal-out-ico"
                  class="l2-craft-modal__out-ico"
                  width="44"
                  height="44"
                  alt=""
                />
                <div class="l2-craft-modal__head-txt">
                  <h2 id="l2-craft-modal-title" class="l2-craft-modal__title">Крафт</h2>
                  <p id="l2-craft-modal-sub" class="l2-craft-modal__sub"></p>
                </div>
              </div>
              <div class="l2-craft-modal__row l2-craft-modal__row--summary">
                <div class="l2-craft-modal__summary" id="l2-craft-modal-summary"></div>
                <button
                  type="button"
                  class="btn-l2 l2-craft-btn l2-craft-modal__confirm"
                  id="l2-craft-modal-confirm"
                >
                  Крафт
                </button>
              </div>
              <div class="l2-craft-modal__row l2-craft-modal__row--qty">
                <label class="l2-craft-modal__label" for="l2-craft-modal-qty">Кількість</label>
                <input
                  type="number"
                  id="l2-craft-modal-qty"
                  class="l2-craft-modal__input"
                  min="1"
                  step="1"
                  value="1"
                  autocomplete="off"
                  inputmode="numeric"
                />
                <span class="l2-craft-modal__qty-hint" id="l2-craft-modal-qty-hint"></span>
              </div>
              <p class="l2-craft-modal__err" id="l2-craft-modal-err" hidden></p>
            </div>
          </div>

          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260707navChatIcon1"></script>
    <script src="/craftProfessions.js"></script>
    <script src="/craft.js?v=20260505craftModal"></script>
  </body>
</html>
