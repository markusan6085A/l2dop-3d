<!DOCTYPE html>

  <head>
    <meta charset="utf-8" />

  <body
    class="l2-body l2-page-city l2-city-ui-l2 l2-page-townlive l2-page-has-fixed-nav l2-app-l2-chrome l2-nav-minimal"

    <div class="l2-shell">
      <div class="l2-screen l2-city-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-city-root">
          <div class="l2-townlive-column">
            <div id="l2-hud-panel-mount"></div>

            <div id="l2-nav-top"></div>

            <p class="err" id="city-load-err" hidden></p>

            <section
              class="l2-townlive-services"
              id="city-services"
              data-i18n-attr="aria-label:city_aria_services"
              aria-label="Місто"
              hidden
            >
              <p class="l2-city-stub-msg" id="city-stub-msg" hidden></p>

              <div class="l2-town-miru">
                <p class="l2-town-miru-loc" id="city-loc-name">
                  <span class="l2-town-miru-loc-glyph" aria-hidden="true">🏰</span>
                  <span class="l2-town-miru-loc-text">—</span>
                </p>
                <nav class="l2-town-miru-list" aria-label="Місто">
                  <a class="l2-town-miru-item" href="/teleport.html">
                    <span class="l2-town-miru-glyph" aria-hidden="true">✝️</span>
                    <span data-i18n="city_link_teleport">Телепорт</span>
                  </a>
                  <button type="button" class="l2-town-miru-item" data-i18n-stub="city_btn_arena_pvp">
                    <span class="l2-town-miru-glyph" aria-hidden="true">⚔️</span>
                    <span data-i18n="city_btn_arena_pvp">Арена PVP</span>
                  </button>
                  <a class="l2-town-miru-item" href="/town-buffer.html">
                    <span class="l2-town-miru-glyph" aria-hidden="true">👑</span>
                    <span data-i18n="city_btn_buffer_statue">Магічна статуя</span>
                  </a>
                  <a class="l2-town-miru-item" href="/gm-shop.html">
                    <span class="l2-town-miru-glyph" aria-hidden="true">⚔️</span>
                    <span data-i18n="city_link_gm_shop_items">Магазин речей</span>
                  </a>
                  <button type="button" class="l2-town-miru-item" data-i18n-stub="nav_market">
                    <span class="l2-town-miru-glyph" aria-hidden="true">⚔️</span>
                    <span data-i18n="nav_market">Ринок</span>
                  </button>
                  <a class="l2-town-miru-item" href="/magisters.html">
                    <span class="l2-town-miru-glyph" aria-hidden="true">⚔️</span>
                    <span data-i18n="city_link_magisters_guild">Гільдія магів</span>
                  </a>
                  <button type="button" class="l2-town-miru-item" data-i18n-stub="city_btn_warehouse">
                    <span class="l2-town-miru-glyph" aria-hidden="true">⚔️</span>
                    <span data-i18n="city_btn_warehouse">Склад</span>
                  </button>
                  <button type="button" class="l2-town-miru-item" data-i18n-stub="city_btn_fisher">
                    <span class="l2-town-miru-glyph" aria-hidden="true">⚔️</span>
                    <span data-i18n="city_btn_fisher">Рибалка</span>
                  </button>
                  <button type="button" class="l2-town-miru-item" data-i18n-stub="city_btn_manor">
                    <span class="l2-town-miru-glyph" aria-hidden="true">⚔️</span>
                    <span data-i18n="city_btn_manor">Манор</span>
                  </button>
                  <button type="button" class="l2-town-miru-item" data-i18n-stub="city_btn_seven_seals">
                    <span class="l2-town-miru-glyph" aria-hidden="true">⚔️</span>
                    <span data-i18n="city_btn_seven_seals">7 Печатей</span>
                  </button>
                  <button type="button" class="l2-town-miru-item" data-i18n-stub="city_btn_olympiad_short">
                    <span class="l2-town-miru-glyph" aria-hidden="true">⚔️</span>
                    <span data-i18n="city_btn_olympiad_short">Олімпіада</span>
                  </button>
                  <button type="button" class="l2-town-miru-item" data-i18n-stub="city_btn_brave_hunter">
                    <span class="l2-town-miru-glyph" aria-hidden="true">⚔️</span>
                    <span data-i18n="city_btn_brave_hunter">Відважний мисливець</span>
                  </button>
                  <button type="button" class="l2-town-miru-item l2-town-miru-item--last" data-i18n-stub="nav_clan">
                    <span class="l2-town-miru-glyph" aria-hidden="true">👑</span>
                    <span data-i18n="city_btn_clans">Клани</span>
                  </button>
                </nav>
              </div>

              <div id="l2-foot-links"></div>
            </section>

            <div id="l2-nav-bottom"></div>
          </div>
        </div>
      </div>

    <script src="/common.js?v=20260709legacyHudTop6"></script>
