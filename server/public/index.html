<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>L2DOP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260426warmUi" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=7" />
    <link rel="stylesheet" href="/css/l2-app-chrome-skin.css?v=29" />
  </head>
  <body class="l2-body l2-page-city l2-page-townlive l2-page-auth l2-app-l2-chrome">
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-city-root">
          <div class="l2-townlive-column">
            <header
              class="l2-city-head"
              data-i18n-attr="aria-label:aria_header"
              aria-label="Заголовок"
            >
              <p class="l2-city-head-tagline" data-i18n="tagline">Онлайн гра Lineage II</p>
              <h1 class="l2-logo">L2DOP</h1>
              <p class="l2-auth-sub" data-i18n="auth_sub">Мобільна онлайн гра · Lineage II</p>
              <p class="l2-auth-badge" data-i18n="auth_badge">Greenfield · сервер правди</p>
            </header>

            <a class="btn-cta" href="#login-block" data-i18n="auth_start">Почати гру!</a>

            <p class="l2-auth-meta" data-i18n="auth_online">Онлайн: залежить від сервера</p>
            <p class="l2-auth-meta l2-auth-meta--muted" data-i18n="auth_thin_client">
              Тонкий клієнт · snapshot з API
            </p>

            <hr />

            <div class="main" id="login-block">
              <span class="main-inner-frame" aria-hidden="true"></span>
              <div class="main-ornament-top" aria-hidden="true"></div>
              <div class="main-ornament-bottom" aria-hidden="true"></div>
              <div class="main-corner-bl" aria-hidden="true"></div>
              <div class="main-corner-br" aria-hidden="true"></div>
              <div class="main-l2-stack">
                <div class="logo" data-i18n="auth_login_title">Вхід</div>
                <p class="desc" data-i18n="auth_login_desc">
                  Логін і пароль. Новий акаунт — через реєстрацію.
                </p>

                <hr />

                <div class="center">
                  <a class="btn-l2" href="/register.html" data-i18n="auth_register">Реєстрація</a>
                </div>

                <hr />

                <form id="form-login" action="#" method="post" onsubmit="return false;">
                  <label class="lbl-l2" for="in-login" data-i18n="auth_label_login">Логін</label>
                  <input
                    id="in-login"
                    class="inp-l2"
                    type="text"
                    name="login"
                    autocomplete="username"
                  />

                  <label class="lbl-l2" for="in-pass" data-i18n="auth_label_pass">Пароль</label>
                  <input
                    id="in-pass"
                    class="inp-l2"
                    type="password"
                    name="password"
                    autocomplete="current-password"
                  />

                  <div class="center" style="margin-top: 16px">
                    <button type="button" id="btn-login" class="btn-l2" data-i18n="auth_submit">
                      Увійти
                    </button>
                  </div>
                </form>

                <p class="err" id="login-msg" hidden></p>
              </div>
            </div>

            <nav
              class="l2-dock l2-dock--auth"
              data-i18n-attr="aria-label:auth_dock_aria"
              aria-label="Швидкі посилання"
            >
              <a href="/register.html" data-i18n="auth_register">Реєстрація</a>
              <a href="/city.html" id="link-city" data-i18n="auth_dock_city">Місто</a>
              <a href="#" data-i18n="auth_dock_about">Про сервер</a>
            </nav>

            <p class="footer-links">
              <span>L2DOP</span>
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="/common.js"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/main.js"></script>
  </body>
</html>
