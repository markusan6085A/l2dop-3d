<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="page_clan_manage_title">Керування кланом — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260720hudClanEmblemBeforeNick1" />
    <link rel="stylesheet" href="/css/l2-clans-page.css?v=20260718clans9" />
  </head>
  <body
    class="l2-body l2-page-city l2-city-ui-l2 l2-page-clan-manage l2-page-has-fixed-nav l2-app-l2-chrome"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-city-root">
          <div class="l2-townlive-column">
            <div id="l2-hud-panel-mount"></div>

            <div id="l2-nav-top"></div>

            <p class="err" id="clan-manage-err" hidden></p>
            <p class="l2-city-stub-msg" id="clan-manage-stub-msg" hidden></p>

            <section
              class="l2-clans-main"
              data-i18n-attr="aria-label:clan_manage_section_aria"
              aria-label="Керування кланом"
            >
              <div id="clan-manage-panel" class="l2-clan-manage-panel l2-clan-manage-panel--loading">
                <p class="l2-clan-manage-title" data-i18n="clan_manage_title">Керування кланом</p>
                <p class="l2-clan-manage-clan">
                  <span class="l2-clan-my-label" data-i18n="clan_my_label_clan">Клан:</span>
                  <span id="clan-manage-name" class="l2-clan-my-val l2-clan-my-val--name">—</span>
                </p>
                <p class="l2-clan-manage-stats">
                  <span class="l2-clan-my-label">Рівень:</span>
                  <span id="clan-manage-level" class="l2-clan-my-val">—</span>
                  <span class="l2-clan-manage-stats-sep"> · </span>
                  <span class="l2-clan-my-label">Очки клану:</span>
                  <span id="clan-manage-points" class="l2-clan-my-val">—</span>
                </p>

                <hr class="l2-clans-divider" aria-hidden="true" />

                <div class="l2-clan-manage-emblem">
                  <p class="l2-clan-manage-emblem__toggle">
                    <button
                      type="button"
                      class="l2-clan-manage-nav-link"
                      id="clan-manage-emblem-toggle"
                    >
                      Вибір емблеми
                    </button>
                  </p>
                  <div
                    id="clan-manage-emblem-picker"
                    class="l2-clan-manage-emblem__picker"
                    hidden
                    aria-label="Обери емблему"
                  ></div>
                  <p class="l2-clan-manage-emblem__actions" id="clan-manage-emblem-save-wrap" hidden>
                    <button type="button" class="l2-clans-submit-btn" id="clan-manage-emblem-save">
                      Зберегти емблему
                    </button>
                  </p>
                </div>

                <nav class="l2-clan-manage-nav" aria-label="Дії керування кланом">
                  <a class="l2-clan-manage-nav-link" href="/clan-level.html" id="clan-manage-level-link"
                    >Підвищити рівень клану</a
                  >
                  <button type="button" class="l2-clan-manage-nav-link" data-stub="clan_manage_stub_invite">
                    <span data-i18n="clan_manage_invite">Запросити в клан</span>
                  </button>
                  <button type="button" class="l2-clan-manage-nav-link" data-stub="clan_manage_stub_requests">
                    <span data-i18n="clan_manage_requests">Заявки в клан</span>
                  </button>
                  <button type="button" class="l2-clan-manage-nav-link" data-stub="clan_manage_stub_kick">
                    <span data-i18n="clan_manage_kick">Вигнати учасника</span>
                  </button>
                  <button type="button" class="l2-clan-manage-nav-link" data-stub="clan_manage_stub_ranks">
                    <span data-i18n="clan_manage_ranks">Ранги учасників</span>
                  </button>
                  <button type="button" class="l2-clan-manage-nav-link" data-stub="clan_manage_stub_disband">
                    <span data-i18n="clan_manage_disband">Розпустити клан</span>
                  </button>
                </nav>
              </div>

              <p class="l2-clans-back">
                <a class="l2-clans-back__link" href="/clan-my.html" data-i18n="clan_manage_back_my"
                  >&lt;&lt; Назад до мого клану</a
                >
              </p>
            </section>

            <div id="l2-foot-links"></div>
            <div id="l2-nav-bottom"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260720hudClanEmblemBeforeNick1"></script>
    <script src="/ui-i18n.js?v=20260718clans8"></script>
    <script src="/l2-nav.js?v=20260718layoutStable2"></script>
    <script src="/clan-manage.js?v=20260719clanManageEmblem1"></script>
  </body>
</html>
