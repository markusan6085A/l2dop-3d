<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Міський бафер — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260501nav7" />
    <link rel="stylesheet" href="/css/l2-outer-sframe.css?v=20260708globalClsAll2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260708globalClsAll2" />
    <link rel="stylesheet" href="/css/l2-hud-panel.css?v=20260711nickWarm2" />
    <link rel="stylesheet" href="/css/l2-app-chrome-skin.css?v=20260711nickTone3" />
    <link rel="stylesheet" href="/css/l2-city-222-skin.css?v=20260711nickTone1" />
    <style>
      .l2-town-buffer-root {
        padding: 10px 10px 12px;
      }
      .l2-town-buffer-card {
        margin-top: 8px;
        border: none;
        border-radius: 0;
        background-color: #1d1c1a;
        background-image: none;
        box-shadow: none;
        padding: 18px 12px 14px;
      }
      .l2-town-buffer-title {
        margin: 0 0 12px;
        text-align: center;
        color: #d8c8a8;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.85);
        font: 700 17px/1.2 'Lora', Georgia, serif;
      }
      .l2-town-buffer-row {
        display: grid;
        grid-template-columns: repeat(11, 1fr);
        gap: 5px;
        margin: 0 0 12px;
      }
      .l2-town-buffer-skill {
        display: grid;
        place-items: center;
      }
      .l2-town-buffer-skill img {
        width: 26px;
        height: 26px;
        border-radius: 3px;
        border: 1px solid rgba(197, 152, 74, 0.7);
        background: #111;
      }
      .l2-town-buffer-actions {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .l2-town-buffer-fee {
        margin: 0;
        font-size: 12px;
        color: #fff;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.85);
      }
      .l2-town-buffer-text-btn {
        margin: 0;
        padding: 0 2px;
        border: 0;
        background: transparent;
        font: inherit;
        font-size: 12px;
        line-height: 1.35;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.85);
        text-decoration: underline;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .l2-town-buffer-text-btn--apply {
        color: #5ec85e;
      }
      .l2-town-buffer-text-btn--apply:hover:not(:disabled),
      .l2-town-buffer-text-btn--apply:focus-visible:not(:disabled) {
        color: #7ee87e;
        outline: none;
      }
      .l2-town-buffer-text-btn--restore {
        color: #fff;
        text-decoration: underline;
      }
      .l2-town-buffer-text-btn--restore:hover:not(:disabled),
      .l2-town-buffer-text-btn--restore:focus-visible:not(:disabled) {
        color: #fff;
        outline: none;
      }
      .l2-town-buffer-restore-label,
      .l2-town-buffer-restore-sep {
        color: #e8dcc0;
      }
      .l2-town-buffer-vital--hp {
        color: #c41818;
      }
      .l2-town-buffer-vital--mp {
        color: #1e7ae8;
      }
      .l2-town-buffer-vital--cp {
        color: #d4a020;
      }
      .l2-town-buffer-text-btn:disabled {
        opacity: 0.45;
        cursor: default;
      }
      .l2-town-buffer-msg {
        margin: 0;
        min-height: 16px;
        font-size: 12px;
        color: #b8a888;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.75);
        text-align: center;
        line-height: 1.35;
      }
    </style>
  </head>
  <body class="l2-body l2-page-city l2-city-ui-l2 l2-page-townlive l2-page-has-fixed-nav l2-app-l2-chrome">
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img class="l2-outer-sframe__cap-tl-img" src="/ref/19.png" alt="" width="28" height="52" decoding="async" />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img class="l2-outer-sframe__cap-tr-img" src="/ref/18.png" alt="" width="28" height="52" decoding="async" />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img class="l2-game-chrome-crest__img" src="/ref/2.png" alt="" width="40" height="40" decoding="async" />
        </div>
        <div class="l2-screen-inner l2-town-buffer-root">
          <div id="l2-hud-panel-mount"></div>
          <div id="l2-nav-top"></div>
          <p class="err" id="town-buffer-load-err" hidden></p>

          <section class="l2-town-buffer-card" id="town-buffer-card" hidden>
            <h1 class="l2-town-buffer-title">Міський бафер</h1>
            <div class="l2-town-buffer-row" id="town-buffer-row"></div>
            <div class="l2-town-buffer-actions">
              <p class="l2-town-buffer-fee" id="town-buffer-fee">Ціна: —</p>
              <button type="button" class="l2-town-buffer-text-btn l2-town-buffer-text-btn--apply" id="town-buffer-apply-btn">Взяти баф</button>
              <button type="button" class="l2-town-buffer-text-btn l2-town-buffer-text-btn--restore" id="town-buffer-restore-btn">
                <span class="l2-town-buffer-restore-label">Відновити </span><span class="l2-town-buffer-vital l2-town-buffer-vital--hp">HP</span><span class="l2-town-buffer-restore-sep"> | </span><span class="l2-town-buffer-vital l2-town-buffer-vital--mp">MP</span><span class="l2-town-buffer-restore-sep"> | </span><span class="l2-town-buffer-vital l2-town-buffer-vital--cp">CP</span>
              </button>
              <p class="l2-town-buffer-msg" id="town-buffer-msg"></p>
            </div>
          </section>
          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260711nickWarm2"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260707navChatIcon1"></script>
    <script src="/town-buffer.js?v=20260711bufferText1"></script>
  </body>
</html>
