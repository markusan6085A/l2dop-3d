<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Головна — L2Multi</title><link rel="stylesheet" href="/styles.css?v=20260509charBagTabs" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260708globalClsAll2" />
    <link rel="stylesheet" href="/css/l2-app-chrome-skin.css?v=20260708globalClsAll2" />
    <style>
      .l2-auth-home {
        width: min(100%, 360px);
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
        text-align: center;
      }

      .l2-auth-home__head {
        color: #d8c39a;
        font: 600 17px/1.2 "Lora", Georgia, serif;
        text-shadow: 0 1px 0 rgba(0, 0, 0, 0.85);
        margin: 0;
      }

      .l2-auth-home__banner {
        width: 100%;
        max-width: 220px;
        border-radius: 4px;
        display: block;
      }

      .l2-auth-home__meta {
        width: 100%;
        border: 1px solid rgba(184, 153, 88, 0.45);
        color: #d9c59d;
        font-size: 12px;
        line-height: 1.2;
        padding: 4px 8px;
      }

      .l2-auth-home__play {
        border: 0;
        background-color: transparent;
        background-repeat: no-repeat;
        background-position: center;
        background-size: 100% 100%;
        cursor: pointer;
        color: transparent;
        display: block;
      }

      .l2-auth-home__play {
        width: 198px;
        height: 44px;
        background-image: url("/assets/play-button.png");
      }

      .l2-auth-home__btn-frame {
        box-sizing: border-box;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 32px;
        padding: 6px 10px;
        border: 0;
        border-radius: 0;
        background-color: transparent;
        background-image: url("/assets/1512125-removebg-preview-removebg-preview.png?v=20260705home1512");
        background-repeat: no-repeat;
        background-position: center;
        background-size: 100% 100%;
        color: #f0e6b8;
        font: 600 11px/1.25 "Lora", Georgia, serif;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.85);
        text-decoration: none;
        cursor: pointer;
      }

      .l2-auth-home__btn-frame:hover,
      .l2-auth-home__btn-frame:focus-visible {
        filter: brightness(1.06);
        outline: none;
      }

      .l2-auth-home__field-wrap {
        width: 100%;
        max-width: 210px;
        display: grid;
        gap: 6px;
        justify-items: stretch;
      }

      .l2-auth-home__lbl {
        color: #d8c39a;
        font-size: 12px;
      }

      .l2-auth-home__field {
        width: 100%;
        height: 20px;
        border: 0;
        outline: 0;
        background: #d7d09a;
        color: #18140f;
        padding: 0 6px;
      }

      .l2-auth-home__login {
        width: 100%;
        max-width: 210px;
        margin: 0 auto;
      }

      .l2-auth-home__remember {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        color: #d8c39a;
        font-size: 11px;
      }

      .l2-auth-home__actions {
        display: grid;
        gap: 6px;
        width: 100%;
        max-width: 232px;
      }

      .l2-auth-home__link {
        width: 100%;
      }

      .l2-auth-home__err {
        color: #f0b4aa;
        font-size: 12px;
        min-height: 16px;
        margin: 0;
      }
    </style>
  </head>
  <body class="l2-body l2-page-city l2-page-townlive l2-page-auth l2-app-l2-chrome">
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img class="l2-outer-sframe__cap-tl-img" src="/ref/19.png" alt="" width="28" height="52" decoding="async" />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img class="l2-outer-sframe__cap-tr-img" src="/ref/18.png" alt="" width="28" height="52" decoding="async" />
          </div>
        </div>
        <div class="l2-screen-inner l2-city-root">
          <main class="l2-auth-home" aria-label="Головна сторінка входу">
            <h1 class="l2-auth-home__head">Онлайн Игра Wap LineAge</h1>
            <img class="l2-auth-home__banner" src="/assets/banner.png" alt="" />
            <p class="l2-auth-home__meta">Сейчас в игре 0 человек, всего 0</p>

            <button id="btn-play" class="l2-auth-home__play" type="button" aria-label="Почати гру"></button>

            <div class="l2-auth-home__field-wrap">
              <label class="l2-auth-home__lbl" for="in-login">Нік:</label>
              <input id="in-login" class="l2-auth-home__field" type="text" autocomplete="username" />

              <label class="l2-auth-home__lbl" for="in-pass">Пароль:</label>
              <input id="in-pass" class="l2-auth-home__field" type="password" autocomplete="current-password" />

              <button id="btn-login" class="l2-auth-home__login l2-auth-home__btn-frame" type="button">
                Войти в игру
              </button>
              <label class="l2-auth-home__remember" for="auth-remember">
                <input id="auth-remember" type="checkbox" />
                Запам'ятати логін
              </label>
            </div>

            <div class="l2-auth-home__actions">
              <a class="l2-auth-home__link l2-auth-home__btn-frame" href="/register.html">Регистрация</a>
              <a class="l2-auth-home__link l2-auth-home__btn-frame" href="/story.html">Об игре</a>
              <a id="auth-forgot-pass" class="l2-auth-home__link l2-auth-home__btn-frame" href="#">Забил пароль</a>
            </div>

            <p id="login-msg" class="l2-auth-home__err" hidden></p>
          </main>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var play = document.getElementById('btn-play');
        var login = document.getElementById('btn-login');
        if (!play || !login) return;
        play.addEventListener('click', function () {
          login.click();
        });
      })();
    </script>
    <script src="/common.js"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/main.js"></script>
  </body>
</html>
