<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Продати речі — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-item-colors.css?v=20260717itemGrade2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260718layoutStable2" />
    <link rel="stylesheet" href="/css/l2-city-222-skin.css?v=20260711cityMiruTone1" />
    <link rel="stylesheet" href="/css/l2-char-222-skin.css?v=20260711shopSubTabsRow1" />
    <style>
      .l2-market-sell-root {
        padding: 8px 10px 14px;
      }
      .l2-market-sell-title {
        margin: 0 0 10px;
        font-size: 14px;
        line-height: 1.35;
        font-weight: 600;
        color: #fff;
      }
      .l2-market-sell-empty {
        margin: 12px 0;
        text-align: center;
        color: #a89a70;
        font-size: 13px;
      }
      body.l2-app-l2-chrome.l2-page-city .l2-char-bag-pager {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1cm;
        margin: 10px 0 0;
        padding: 0;
      }
      body.l2-app-l2-chrome.l2-page-city .l2-char-bag-pager[hidden] {
        display: none;
      }
      body.l2-app-l2-chrome.l2-page-city .l2-char-bag-pager__btn {
        min-width: 0;
        margin: 0;
        padding: 0 4px;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        line-height: 1.35;
        color: #e84848;
        text-decoration: none;
        cursor: pointer;
      }
      body.l2-app-l2-chrome.l2-page-city .l2-char-bag-pager__btn:hover:not(:disabled),
      body.l2-app-l2-chrome.l2-page-city .l2-char-bag-pager__btn:focus:not(:disabled),
      body.l2-app-l2-chrome.l2-page-city .l2-char-bag-pager__btn:focus-visible:not(:disabled) {
        color: #ff6a6a;
        text-decoration: underline;
        outline: none;
      }
      body.l2-app-l2-chrome.l2-page-city .l2-char-bag-pager__btn:disabled {
        opacity: 0.35;
        cursor: default;
      }
      .l2-market-sell-tabs {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 4px 10px;
        margin: 0 0 8px;
        font-size: 12px;
        line-height: 1.35;
      }
      .l2-market-sell-tab {
        margin: 0;
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--l2-market-sell-tab-shield, #8f7a5e);
        font: inherit;
        font-size: 12px;
        line-height: 1.35;
        text-decoration: underline;
        cursor: pointer;
      }
      .l2-market-sell-tab--active {
        color: var(--l2-market-sell-tab-shield, #8f7a5e);
        font-weight: 600;
        text-decoration: none;
      }
      .l2-market-sell-list .l2-char-bag-row:not(:last-child) {
        border-bottom: 1px solid rgba(100, 80, 52, 0.45);
      }
      .l2-market-sell-filter-empty {
        margin: 8px 0;
        font-size: 13px;
        color: #a89a70;
      }
      .l2-market-sell-root a.l2-char-bag-name {
        text-decoration: underline;
        cursor: pointer;
      }
    </style>
  </head>
  <body
    class="l2-body l2-page-city l2-city-ui-l2 l2-page-townlive l2-page-has-fixed-nav l2-app-l2-chrome l2-nav-minimal"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-city-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-market-sell-root">
          <div class="l2-chrome-nav-column l2-townlive-column">
            <div id="l2-hud-panel-mount"></div>
            <div id="l2-nav-top"></div>

            <p class="err" id="market-sell-load-err" hidden></p>

            <section id="market-sell-content">
              <p class="l2-market-sell-title">Продати речі</p>

              <nav id="market-sell-tabs" class="l2-market-sell-tabs" aria-label="Категорії"></nav>

              <div id="market-sell-list" class="l2-char-bag-list l2-market-sell-list" aria-label="Речі в інвентарі"></div>
              <p class="l2-market-sell-empty" id="market-sell-empty" hidden>У сумці немає речей.</p>
              <p class="l2-market-sell-filter-empty" id="market-sell-filter-empty" hidden>
                У цій категорії нічого немає.
              </p>
              <div id="market-sell-pager" class="l2-char-bag-pager" hidden></div>

              <div id="l2-foot-links"></div>
            </section>

            <div id="l2-nav-bottom"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260718layoutStable2"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260718layoutStable2"></script>
    <script src="/market-sell-filters.js?v=20260716marketSell4"></script>
    <script src="/market-sell.js?v=20260717itemGrade2"></script>
  </body>
</html>
