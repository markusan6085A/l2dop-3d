<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Перс — L2WAP</title><link rel="stylesheet" href="/styles.css?v=20260718heroFeet5" />
    <link rel="preload" as="image" href="/assets/fons_pers.jpg" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260718layoutStable2" />
    <link rel="stylesheet" href="/css/l2-char-222-skin.css?v=20260718heroFeet5" />
  </head>
  <body
    class="l2-body l2-page-city l2-page-char l2-city-ui-l2 l2-page-townlive l2-page-has-fixed-nav l2-app-l2-chrome l2-nav-minimal"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-city-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-char-root">
          <div id="l2-hud-panel-mount"></div>

          <div id="l2-nav-top"></div>

          <p class="err" id="char-load-err" hidden></p>

          <div id="char-content">
            <div class="l2-char-mobi">
              <div class="l2-char-title-row">
                <span class="l2-char-title-empty">Порожній титул</span>
                <span class="l2-char-name-bracket" id="char-name-bracket"></span>
              </div>

              <div class="l2-char-photo-wrap" aria-label="Персонаж">
                <!-- Внутрішній блок як text-rpg CharacterEquipmentFrame (герой + слоти) -->
                <div class="l2-char-equip-frame">
                  <div class="l2-char-equip-bg">
                    <img
                      class="l2-char-equip-scene"
                      src="/assets/fons_pers.jpg"
                      width="300"
                      height="220"
                      alt=""
                      decoding="async"
                      fetchpriority="high"
                    />
                    <div class="l2-char-equip-hero-stage" id="char-hero-stage" hidden>
                      <img
                        id="char-hero-img"
                        class="l2-char-equip-hero l2-char-equip-hero-overlay"
                        alt=""
                        decoding="async"
                      />
                    </div>
                  </div>
                  <div class="l2-char-equip-slots l2-char-equip-slots--left">
                    <img data-l2-slot="head" data-l2-eq-key="lh" class="l2-char-slot-icon" src="/icons/slot_head.png" alt="" />
                    <img data-l2-slot="armor" data-l2-eq-key="l3" class="l2-char-slot-icon" src="/icons/slot_armor.png" alt="" />
                    <img data-l2-slot="legs" data-l2-eq-key="l4" class="l2-char-slot-icon" src="/icons/slot_legs.png" alt="" />
                    <img data-l2-slot="gloves" data-l2-eq-key="lg" class="l2-char-slot-icon" src="/icons/slot_gloves.png" alt="" />
                    <img data-l2-slot="boots" data-l2-eq-key="lf" class="l2-char-slot-icon" src="/icons/slot_boots.png" alt="" />
                    <img data-l2-slot="belt" class="l2-char-slot-icon" src="/icons/slot_belt.png" alt="" />
                    <div class="l2-char-equip-weapons-row">
                      <img data-l2-slot="weapon" data-l2-eq-key="l1" class="l2-char-slot-icon" src="/icons/slot_weapon.png" alt="" />
                      <img data-l2-slot="shield" data-l2-eq-key="l2" class="l2-char-slot-icon" src="/icons/slot_shield.png" alt="" />
                    </div>
                  </div>
                  <div class="l2-char-equip-slots l2-char-equip-slots--right">
                    <img data-l2-slot="jewelry" class="l2-char-slot-icon" src="/icons/slot_jewelry.png" alt="" />
                    <img data-l2-slot="necklace" data-l2-eq-key="neck" class="l2-char-slot-icon" src="/icons/slot_necklace.png" alt="" />
                    <img data-l2-slot="earring_left" data-l2-eq-key="le1" class="l2-char-slot-icon" src="/icons/slot_earring_left.png" alt="" />
                    <img data-l2-slot="earring_right" data-l2-eq-key="le2" class="l2-char-slot-icon" src="/icons/slot_earring_right.png" alt="" />
                    <img data-l2-slot="ring_left" data-l2-eq-key="lr1" class="l2-char-slot-icon" src="/icons/slot_ring_left.png" alt="" />
                    <img data-l2-slot="ring_right" data-l2-eq-key="lr2" class="l2-char-slot-icon" src="/icons/slot_ring_right.png" alt="" />
                    <div class="l2-char-equip-weapons-row">
                      <img data-l2-slot="tattoo" class="l2-char-slot-icon" src="/icons/slot_tattoo.png" alt="" />
                      <img data-l2-slot="cloak" class="l2-char-slot-icon" src="/icons/slot_cloak.png" alt="" />
                    </div>
                  </div>
                </div>
                <div class="l2-char-currency">
                  <span class="l2-char-currency-seg" title="Адена">
                    <img
                      class="l2-char-currency-ico"
                      src="/assets/l2dop/etc_adena_i00.png"
                      width="16"
                      height="16"
                      alt=""
                    />
                    <span class="l2-char-adena-label">Адена</span>
                    <span id="char-adena">0</span>
                  </span>
                  <span class="l2-char-currency-seg" title="Досвід">
                    <img
                      class="l2-char-currency-ico"
                      src="/assets/l2dop/etc_exp_point_i00.png"
                      width="16"
                      height="16"
                      alt=""
                    />
                    <span class="l2-char-adena-label">EXP</span>
                    <span id="char-exp">0</span>
                  </span>
                  <span class="l2-char-currency-seg" title="Очки вмінь">
                    <img
                      class="l2-char-currency-ico"
                      src="/assets/l2dop/etc_sp_point_i00.png"
                      width="16"
                      height="16"
                      alt=""
                    />
                    <span class="l2-char-adena-label">SP</span>
                    <span id="char-sp">0</span>
                  </span>
                  <span class="l2-char-weight" title="Вага інвентаря"
                    >(<span id="char-w-cur">2</span>/<span id="char-w-max">250</span>)</span
                  >
                </div>
              </div>

              <div class="l2-char-bag-block" aria-label="Сумка">
                <p class="l2-char-bag-title">У сумці</p>
                <div class="l2-char-inv-filters" aria-label="Категорії сумки">
                  <div class="l2-char-inv-shop-tabs-host l2-gm-shop">
                    <div class="l2-char-inv-cats-wrap">
                      <div
                        id="char-bag-tab-all-host"
                        class="l2-char-inv-all-host"
                        aria-label="Все"
                      ></div>
                      <div
                        id="char-bag-tab-cats"
                        class="l2-drops-shop-tablist l2-drops-shop-tablist--cats"
                        role="tablist"
                        aria-label="Тип предмета"
                      ></div>
                    </div>
                    <div
                      id="char-bag-tab-grades"
                      class="l2-drops-shop-tablist l2-drops-shop-tablist--grades"
                      role="tablist"
                      aria-label="Грейд"
                    ></div>
                    <div
                      id="char-bag-tab-subs"
                      class="l2-drops-shop-tablist l2-drops-shop-tablist--weapon-kind"
                      role="tablist"
                      aria-label="Підкатегорія"
                      hidden
                    ></div>
                  </div>
                </div>
                <div id="char-bag-list" class="l2-char-bag-list"></div>
                <div id="char-bag-pager" class="l2-char-bag-pager" hidden aria-label="Сторінки сумки"></div>
                <p class="l2-char-bag-hint" id="char-bag-empty" hidden>Сумка порожня.</p>
                <p class="l2-char-bag-hint" id="char-bag-filter-empty" hidden>Немає предметів за цим фільтром.</p>
                <p class="l2-char-bag-notice" id="char-bag-notice" hidden></p>
              </div>

              <div id="l2-foot-links"></div>
            </div>
          </div>

          <p class="l2-city-stub-msg" id="char-stub-msg" hidden></p>

          <div id="char-bag-modal-overlay" class="l2-gm-modal-overlay" hidden aria-hidden="true">
            <div class="l2-gm-modal" role="dialog" aria-modal="true" aria-labelledby="char-bag-modal-section-title">
              <button type="button" class="l2-gm-modal-close" id="char-bag-modal-close" aria-label="Закрити">
                ×
              </button>
              <h2 id="char-bag-modal-section-title" class="l2-item-modal-heading">
                Інформація про предмет
              </h2>
              <div class="l2-gm-modal-head">
                <img id="char-bag-modal-icon" class="l2-gm-modal-icon" width="48" height="48" alt="" />
                <div>
                  <p id="char-bag-modal-title" class="l2-gm-modal-title"></p>
                  <p class="l2-gm-modal-sub">
                    <span id="char-bag-modal-grade">—</span> · <span id="char-bag-modal-kind"></span>
                  </p>
                </div>
              </div>
              <div class="l2-item-modal-stats" id="char-bag-modal-stats"></div>
              <p class="l2-gm-modal-price" id="char-bag-modal-qty"></p>
              <div id="char-bag-modal-armor-sets" class="l2-drops-stats-modal__armor-sets" hidden></div>
              <p class="l2-char-bag-modal-craft-hint" id="char-bag-modal-craft-hint" hidden></p>
              <div class="l2-char-bag-modal-use-row" id="char-bag-modal-use-row" hidden>
                <label class="l2-char-bag-modal-use-label" for="char-bag-modal-use-qty">Кількість</label>
                <input
                  type="number"
                  id="char-bag-modal-use-qty"
                  class="l2-char-bag-modal-use-qty"
                  min="1"
                  max="1"
                  value="1"
                  inputmode="numeric"
                />
                <button type="button" class="l2-char-bag-modal-action" id="char-bag-modal-use">
                  Використати
                </button>
              </div>
              <button type="button" class="l2-char-bag-modal-action" id="char-bag-modal-equip" hidden>
                Одіти
              </button>
            </div>
          </div>

          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260719partyRewardSnapshotFix1"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260718layoutStable2"></script>
    <script src="/armor-set-bonuses-ui.js?v=5"></script>
    <script src="/charEquipFrame.js?v=20260718playerEquip1"></script>
    <script src="/charHeroPortrait.js?v=20260718darkElfFighterPng4"></script>
    <script src="/char.js?v=20260718playerEquip1"></script>
  </body>
</html>
