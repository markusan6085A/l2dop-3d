<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Профіль гравця — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260718heroFeet5" />
    <link rel="preload" as="image" href="/assets/fons_pers.jpg" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260718layoutStable2" />
    <link rel="stylesheet" href="/css/l2-char-222-skin.css?v=20260718heroFeet5" />
    <link rel="stylesheet" href="/css/l2-character-page.css?v=20260718heroFeet5" />
    <link rel="stylesheet" href="/css/l2-player-page.css?v=20260718playerStable3" />
    <link rel="stylesheet" href="/css/l2-item-colors.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-recommend-nick-page.css?v=20260711recBlue1" />
  </head>
  <body
    class="l2-body l2-page-city l2-page-player l2-city-ui-l2 l2-page-has-fixed-nav l2-app-l2-chrome l2-nav-minimal"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-city-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-player-root">
          <div id="l2-hud-panel-mount"></div>
          <div id="l2-nav-top"></div>

          <p class="err" id="player-load-err" hidden></p>

          <section
            class="l2-player-panel l2-player-panel--loading"
            id="player-content"
            aria-label="Профіль гравця"
          >
              <p class="l2-player-panel__headline" id="player-headline">—</p>
              <p class="l2-player-panel__status" id="player-status">Немає статусу</p>

              <div class="l2-character-hero-panel l2-player-hero-panel">
                <div class="l2-char-photo-wrap">
                  <div class="l2-char-equip-frame" id="player-equip-frame">
                    <div class="l2-char-equip-bg">
                      <img
                        class="l2-char-equip-scene"
                        src="/assets/fons_pers.jpg"
                        width="300"
                        height="220"
                        alt=""
                        decoding="async"
                        fetchpriority="high"
                      />
                      <div class="l2-char-equip-hero-stage" id="player-hero-stage" hidden>
                        <img
                          id="player-hero-img"
                          class="l2-char-equip-hero l2-char-equip-hero-overlay"
                          alt=""
                          decoding="async"
                        />
                      </div>
                    </div>
                    <div class="l2-char-equip-slots l2-char-equip-slots--left">
                      <img data-l2-slot="head" data-l2-eq-key="lh" class="l2-char-slot-icon" src="/icons/slot_head.png" alt="" />
                      <img data-l2-slot="armor" data-l2-eq-key="l3" class="l2-char-slot-icon" src="/icons/slot_armor.png" alt="" />
                      <img data-l2-slot="legs" data-l2-eq-key="l4" class="l2-char-slot-icon" src="/icons/slot_legs.png" alt="" />
                      <img data-l2-slot="gloves" data-l2-eq-key="lg" class="l2-char-slot-icon" src="/icons/slot_gloves.png" alt="" />
                      <img data-l2-slot="boots" data-l2-eq-key="lf" class="l2-char-slot-icon" src="/icons/slot_boots.png" alt="" />
                      <img data-l2-slot="belt" class="l2-char-slot-icon" src="/icons/slot_belt.png" alt="" />
                      <div class="l2-char-equip-weapons-row">
                        <img data-l2-slot="weapon" data-l2-eq-key="l1" class="l2-char-slot-icon" src="/icons/slot_weapon.png" alt="" />
                        <img data-l2-slot="shield" data-l2-eq-key="l2" class="l2-char-slot-icon" src="/icons/slot_shield.png" alt="" />
                      </div>
                    </div>
                    <div class="l2-char-equip-slots l2-char-equip-slots--right">
                      <img data-l2-slot="jewelry" class="l2-char-slot-icon" src="/icons/slot_jewelry.png" alt="" />
                      <img data-l2-slot="necklace" data-l2-eq-key="neck" class="l2-char-slot-icon" src="/icons/slot_necklace.png" alt="" />
                      <img data-l2-slot="earring_left" data-l2-eq-key="le1" class="l2-char-slot-icon" src="/icons/slot_earring_left.png" alt="" />
                      <img data-l2-slot="earring_right" data-l2-eq-key="le2" class="l2-char-slot-icon" src="/icons/slot_earring_right.png" alt="" />
                      <img data-l2-slot="ring_left" data-l2-eq-key="lr1" class="l2-char-slot-icon" src="/icons/slot_ring_left.png" alt="" />
                      <img data-l2-slot="ring_right" data-l2-eq-key="lr2" class="l2-char-slot-icon" src="/icons/slot_ring_right.png" alt="" />
                      <div class="l2-char-equip-weapons-row">
                        <img data-l2-slot="tattoo" class="l2-char-slot-icon" src="/icons/slot_tattoo.png" alt="" />
                        <img data-l2-slot="cloak" class="l2-char-slot-icon" src="/icons/slot_cloak.png" alt="" />
                      </div>
                    </div>
                  </div>
                </div>
                <p class="l2-character-hero-power" aria-label="Мощ героя">
                  <span class="l2-character-hero-power__label">Мощ:</span>
                  <span class="l2-character-hero-power__val" id="player-hero-power">—</span>
                </p>
              </div>

            <div class="l2-character-stats l2-player-stats" id="player-stats">
              <div class="l2-character-row l2-character-row--stat">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-53-25.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Рівень:</span>
                <span class="l2-character-row__val l2-character-row__val--white" id="player-level">—</span>
              </div>

              <div class="l2-character-row l2-character-row--stat">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-57.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Адена:</span>
                <span class="l2-character-row__val l2-character-row__val--white" id="player-adena">0</span>
              </div>

              <div class="l2-character-row l2-character-row--stat">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-57.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Coin of Luck:</span>
                <span class="l2-character-row__val l2-character-row__val--white" id="player-coin-luck">0</span>
              </div>

              <div class="l2-character-row l2-character-row--stat">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-57.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Досвід:</span>
                <span class="l2-character-row__val l2-character-row__val--white" id="player-exp">0</span>
              </div>

              <div class="l2-character-row l2-character-row--info">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-12.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__info">Кількість отримуваного досвіду:</span>
              </div>

              <div class="l2-character-row l2-character-row--stat">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-12.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Очки умінь:</span>
                <span class="l2-character-row__val l2-character-row__val--white" id="player-sp">0</span>
              </div>

              <div class="l2-character-row l2-character-row--stat l2-character-row--all-white">
                <img
                  class="l2-character-row__ico"
                  src="/assets/assets/photo_2026-07-05_12-52-44.jpg"
                  alt=""
                  width="14"
                  height="14"
                  decoding="async"
                />
                <span class="l2-character-row__label">Професія:</span>
                <span class="l2-character-row__val l2-character-row__val--white" id="player-profession">—</span>
              </div>
            </div>

            <div class="l2-player-social-actions" id="player-social-actions">
                <button
                  type="button"
                  class="l2-player-social-actions__btn"
                  id="player-party-action"
                >
                  Запросити в паті
                </button>
                <button
                  type="button"
                  class="l2-player-social-actions__btn"
                  id="player-clan-action"
                >
                  Запросити в клан
                </button>
              </div>
              <p
                class="l2-player-clan-invite-msg"
                id="player-clan-invite-msg"
                hidden
                aria-live="polite"
              ></p>

              <p class="l2-player-online" id="player-online-text" aria-live="polite">—</p>
              <p class="l2-player-registered" id="player-registered">Рег-я: —</p>

              <h2 class="l2-player-section-title">Соціальний статус</h2>

              <table class="l2-player-social-table" width="99%">
                <tr>
                  <td class="l2-player-social-table__label">Карма</td>
                  <td class="l2-player-social-table__val" id="player-karma">0</td>
                  <td class="l2-player-social-table__gap" aria-hidden="true"></td>
                  <td class="l2-player-social-table__label l2-player-social-table__label--right">PK</td>
                  <td class="l2-player-social-table__val l2-player-social-table__val--right" id="player-pk">
                    0
                  </td>
                </tr>
                <tr>
                  <td class="l2-player-social-table__label">Рек.</td>
                  <td class="l2-player-social-table__val l2-player-social-table__val--rec" id="player-rec">0</td>
                  <td class="l2-player-social-table__gap" aria-hidden="true"></td>
                  <td class="l2-player-social-table__rec-action" colspan="2">
                    <a class="l2-rec-nick-link" id="player-rec-nick-link" href="/recommend-nick.html"
                      >Рекомендовать</a
                    >
                  </td>
                </tr>
                <tr>
                  <td class="l2-player-social-table__label">Убито мобів</td>
                  <td class="l2-player-social-table__val" id="player-mobs">0</td>
                  <td class="l2-player-social-table__gap" aria-hidden="true"></td>
                  <td class="l2-player-social-table__label l2-player-social-table__label--right">
                    PvP перемог/поразок
                  </td>
                  <td class="l2-player-social-table__val l2-player-social-table__val--right" id="player-pvp">
                    0/0
                  </td>
                </tr>
              </table>

              <p class="l2-player-location" id="player-location">—</p>
            </section>

          <p class="l2-city-stub-msg" id="player-stub-msg" hidden></p>

          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260719partyRewardSnapshotFix1"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260718layoutStable2"></script>
    <script src="/charEquipFrame.js?v=20260718playerEquip1"></script>
    <script src="/armor-set-bonuses-ui.js?v=5"></script>
    <script src="/item-stats-modal.js?v=20260717itemStats1"></script>
    <script src="/charHeroPortrait.js?v=20260718darkElfFighterPng4"></script>
    <script src="/player.js?v=20260718playerStable3"></script>
  </body>
</html>
