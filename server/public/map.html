<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Карта — L2WAP</title><link rel="stylesheet" href="/styles.css?v=20260708mapClsHold1" />
    <link rel="stylesheet" href="/css/l2-outer-sframe.css?v=20260708globalClsAll2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260708globalClsAll2" />
    <link rel="stylesheet" href="/css/l2-hud-panel.css?v=24" />
    <link rel="stylesheet" href="/css/l2-app-chrome-skin.css?v=20260709perfLayout1" />
  </head>
  <body class="l2-body l2-page-city l2-page-map l2-city-ui-l2 l2-page-has-fixed-nav l2-app-l2-chrome">
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-map-root">
          <div id="l2-hud-panel-mount"></div>

          <div id="l2-nav-top"></div>

          <p class="err" id="map-load-err" hidden></p>

          <div id="map-content">
            <p class="l2-map-hint" id="map-hint-line" hidden></p>

            <div id="map-stack">
              <div class="l2-map-viewport" id="map-viewport" aria-label="Вікно карти — прокрутка або перетягування">
                <div class="l2-map-zoom-btns" role="toolbar" aria-label="Масштаб карти">
                  <button type="button" class="l2-map-zoom-square" id="map-zoom-out" aria-label="Зменшити карту">
                    −
                  </button>
                  <button type="button" class="l2-map-zoom-square" id="map-zoom-in" aria-label="Збільшити карту">
                    +
                  </button>
                </div>
                <div class="l2-map-inner" id="map-inner">
                  <img
                    id="map-img"
                    class="l2-map-img"
                    src="/assets/maps/aden2.jpg"
                    alt="Карта світу (як у l2dop: img/aden2.jpg)"
                    width="1812"
                    height="2620"
                    draggable="false"
                  />
                  <div id="map-move-target" class="l2-map-move-target" hidden aria-hidden="true"></div>
                  <div id="map-mob-markers" class="l2-map-mob-markers" aria-hidden="true"></div>
                  <div id="map-dot" class="l2-map-dot" aria-hidden="true"></div>
                </div>
              </div>

              <section class="l2-map-mob-section" id="map-mob-section" aria-label="Моби в околицях">
                <button
                  type="button"
                  class="l2-map-mob-title l2-map-mob-title--tap-full"
                  id="map-mob-open-detail"
                  aria-label="Моби в околицях. Відкрити повний список мобів у зоні"
                >
                  Моби в околицях
                </button>
                <div class="l2-map-mob-pager l2-map-mob-pager--top" id="map-mob-pager" hidden>
                  <button type="button" class="l2-map-mob-page-btn" id="map-mob-page-prev" aria-label="Попередня сторінка">
                    &lt;
                  </button>
                  <span class="l2-map-mob-page-ind" id="map-mob-page-ind" aria-live="polite"></span>
                  <button type="button" class="l2-map-mob-page-btn" id="map-mob-page-next" aria-label="Наступна сторінка">
                    &gt;
                  </button>
                </div>
                <ul class="l2-map-mob-list" id="map-mob-list"></ul>
              </section>
            </div>

            <div class="l2-map-mob-detail" id="map-mob-detail" hidden>
              <p class="l2-map-detail-head" id="map-detail-head">Моби поруч</p>
              <ul class="l2-map-mob-list l2-map-mob-list-detail" id="map-mob-detail-list"></ul>
              <div class="l2-map-mob-pager" id="map-mob-detail-pager" hidden>
                <button type="button" class="l2-map-mob-page-btn" id="map-mob-detail-prev" aria-label="Попередня сторінка">
                  &lt;
                </button>
                <span class="l2-map-mob-page-ind" id="map-mob-detail-ind" aria-live="polite"></span>
                <button type="button" class="l2-map-mob-page-btn" id="map-mob-detail-next" aria-label="Наступна сторінка">
                  &gt;
                </button>
              </div>
              <button type="button" class="l2-map-back-btn" id="map-back-to-map">
                До карти
              </button>
            </div>

          </div>

          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <div
      id="map-mob-modal"
      class="l2-map-mob-modal"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="map-mob-modal-title"
    >
      <button type="button" class="l2-map-mob-modal__backdrop" id="map-mob-modal-backdrop" aria-label="Закрити"></button>
      <div class="l2-map-mob-modal__panel">
        <button type="button" class="l2-map-mob-modal__close" id="map-mob-modal-close" aria-label="Закрити">
          ×
        </button>
        <div class="l2-map-mob-modal__head">
          <img id="map-mob-modal-icon" class="l2-map-mob-modal__icon" width="40" height="40" alt="" />
          <div>
            <h3 id="map-mob-modal-title" class="l2-map-mob-modal__title">—</h3>
            <p id="map-mob-modal-sub" class="l2-map-mob-modal__sub"></p>
          </div>
        </div>
        <div class="l2-map-mob-modal__section">
          <div class="l2-map-mob-modal__sec-title">Параметри (бій)</div>
          <dl class="l2-map-mob-modal__stats" id="map-mob-modal-stats"></dl>
        </div>
        <div class="l2-map-mob-modal__section">
          <div class="l2-map-mob-modal__sec-title">Дроп (l2dop)</div>
          <div id="map-mob-modal-drops" class="l2-map-mob-modal__drops"></div>
        </div>
        <div class="l2-map-mob-modal__section">
          <div class="l2-map-mob-modal__sec-title">Спойл</div>
          <div id="map-mob-modal-spoil" class="l2-map-mob-modal__drops"></div>
        </div>
        <p id="map-mob-modal-note" class="l2-map-mob-modal__note" hidden></p>
        <a id="map-mob-modal-battle" class="l2-map-mob-modal__battle" href="#">У бій</a>
      </div>
    </div>

    <script src="/common.js?v=20260709perfLayout1"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260707navChatIcon1"></script>
    <script src="/map.js?v=20260708mapFastFirst2"></script>
  </body>
</html>
