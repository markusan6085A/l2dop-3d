<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="page_magisters_title">Магістри — L2DOP</title><link rel="stylesheet" href="/styles.css?v=20260426warmUi" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260707centerSolid2" />
    <link rel="stylesheet" href="/css/l2-hud-panel.css?v=24" />
    <link rel="stylesheet" href="/css/l2-app-chrome-skin.css?v=20260708flowNav1" />
  </head>
  <body class="l2-body l2-page-city l2-city-ui-l2 l2-page-magisters l2-page-has-fixed-nav l2-app-l2-chrome">
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-city-root">
          <div class="l2-townlive-column">
            <div id="l2-hud-panel-mount"></div>

            <div id="l2-nav-top"></div>

            <p class="err" id="magisters-load-err" hidden></p>
            <p class="l2-city-stub-msg" id="magisters-stub-msg" hidden></p>

            <section
              class="l2-magisters-main"
              id="magisters-main"
              hidden
              data-i18n-attr="aria-label:magisters_section_aria"
              aria-label="Магістри"
            >
              <p class="l2-magisters-back">
                <a class="l2-town-btn" href="/city.html" data-i18n="magisters_back_city"
                  >Назад до міста</a
                >
              </p>
              <div class="l2-magisters-intro">
                <p data-i18n="magisters_intro_p1">
                  Досвідчені майстри готові передати тобі знання про бойові техніки, магічні закляття та особливі
                  навички класу.
                </p>
                <p data-i18n="magisters_intro_p2">
                  Вивчай нові уміння, посилюй свого героя та готуйся до небезпечних пригод і битв.
                </p>
              </div>
              <ul class="l2-city-npc-list" id="magisters-npc-list"></ul>
            </section>

            <div id="l2-foot-links"></div>
            <div id="l2-nav-bottom"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="/common.js"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260707navChatIcon1"></script>
    <script src="/magisters.js?v=20260705noLearnedIcon"></script>
  </body>
</html>
