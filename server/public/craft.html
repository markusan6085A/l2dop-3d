<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Створення предметів — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260720hudClanEmblemBeforeNick1" />
    <link rel="stylesheet" href="/css/l2-craft-page.css?v=20260723-crafted-resource-craft-v1" />
  </head>
  <body class="l2-body l2-page-city l2-city-ui-l2 l2-page-has-fixed-nav l2-app-l2-chrome">
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img class="l2-outer-sframe__cap-tl-img" src="/ref/19.png" alt="" width="28" height="52" decoding="async" />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img class="l2-outer-sframe__cap-tr-img" src="/ref/18.png" alt="" width="28" height="52" decoding="async" />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img class="l2-game-chrome-crest__img" src="/ref/2.png" alt="" width="40" height="40" decoding="async" />
        </div>
        <div class="l2-screen-inner l2-char-root">
          <div id="l2-hud-panel-mount"></div>
          <div id="l2-nav-top"></div>

          <div id="craft-root" class="l2-craft-page">
            <div class="l2-craft-badge">Створення предметів</div>
            <p class="err" id="craft-msg" hidden></p>

            <div class="l2-craft-tabs" role="tablist" aria-label="Крафт">
              <button type="button" class="l2-craft-tab is-active" data-tab="materials">Матеріали</button>
              <button type="button" class="l2-craft-tab" data-tab="weapon" disabled>Зброя</button>
              <button type="button" class="l2-craft-tab" data-tab="armor" disabled>Броня</button>
              <button type="button" class="l2-craft-tab" data-tab="jewelry" disabled>Біжутерія</button>
            </div>

            <div id="craft-meta" class="l2-craft-meta"></div>
            <div id="craft-materials-mount"></div>
            <div id="craft-stub-mount" class="l2-craft-stub" hidden>Ще не додано.</div>
          </div>

          <div id="l2-foot-links"></div>
          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260723-crafted-resource-craft-v1"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260718layoutStable2"></script>
    <script src="/craft.js?v=20260723-crafted-resource-craft-v1"></script>
  </body>
</html>
