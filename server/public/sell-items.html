<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Продаж речей — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260718layoutStable2" />
    <link rel="stylesheet" href="/css/l2-gm-shop-inv-skin.css?v=20260713sellItems1" />
    <link rel="stylesheet" href="/css/l2-sell-items-skin.css?v=20260713shopCongratsColors1" />
  </head>
  <body
    class="l2-body l2-page-city l2-city-ui-l2 l2-page-sell-items l2-page-has-fixed-nav l2-app-l2-chrome"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-char-root">
          <div id="l2-hud-panel-mount"></div>
          <div id="l2-nav-top"></div>

          <div class="l2-sell-items-root">
            <div class="l2-sell-items-head">
              <span class="l2-sell-items-adena" id="sell-items-adena" hidden>
                Адена:
                <strong class="l2-sell-items-adena__amount" id="sell-items-adena-amount"></strong>
              </span>
              <div class="l2-sell-items-badge">Продаж речей</div>
            </div>
            <p class="err" id="sell-items-msg" hidden></p>
            <div id="sell-items-mount" class="l2-sell-items-mount"></div>
            <p class="l2-sell-items-back">
              <a href="/gm-shop.html">← До магазину</a>
            </p>
          </div>

          <div id="l2-foot-links"></div>
          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260718layoutStable4"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260718layoutStable2"></script>
    <script src="/sell-items.js?v=20260715filterAll1"></script>
    <script>
      (function () {
        if (window.L2 && typeof L2.mountL2Nav === 'function') {
          L2.mountL2Nav({ onStub: function () {} });
        }
        if (window.L2 && typeof L2.mountFootLinkBar === 'function') {
          L2.mountFootLinkBar('l2-foot-links', { inset: true });
        }
      })();
    </script>
  </body>
</html>
