<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Онлайн — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260718layoutStable2" />
    <link rel="stylesheet" href="/css/l2-online-page.css?v=20260718onlineStable1" />
  </head>
  <body
    class="l2-body l2-page-city l2-city-ui-l2 l2-page-online l2-page-has-fixed-nav l2-app-l2-chrome l2-nav-minimal"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-online-root">
          <div id="l2-hud-panel-mount"></div>
          <div id="l2-nav-top"></div>

          <p class="err" id="online-load-err" hidden></p>

          <section
            class="l2-online-panel l2-online-panel--loading"
            id="online-content"
            aria-label="Онлайн"
          >
            <h1 class="l2-online-head">
              Зараз у грі (<span class="l2-online-head__count" id="online-count">—</span>)
            </h1>

            <div class="l2-online-sort" role="group" aria-label="Сортування">
              <span class="l2-online-sort__label">Сортувати за:</span>
              <button type="button" class="l2-online-sort__btn" data-sort="level" id="online-sort-level">
                рівнем
              </button>
              <span class="l2-online-sort__sep" aria-hidden="true">|</span>
              <button type="button" class="l2-online-sort__btn" data-sort="name" id="online-sort-name">
                ніком
              </button>
              <span class="l2-online-sort__sep" aria-hidden="true">|</span>
              <button type="button" class="l2-online-sort__btn" data-sort="power" id="online-sort-power">
                мощ
              </button>
            </div>

            <p class="l2-online-clan-filter">Без клану</p>

            <div class="l2-online-col-head-row" aria-hidden="true">
              <span class="l2-online-col-head l2-online-col-head--nick">Нік</span>
              <span class="l2-online-col-head l2-online-col-head--power">Мощ</span>
            </div>

            <div class="l2-online-list" id="online-players-list" aria-live="polite"></div>
          </section>

          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260718layoutStable4"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260718layoutStable2"></script>
    <script src="/online.js?v=20260718onlineStable1"></script>
  </body>
</html>
