<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="page_clan_hall_title">КланХолл — L2WAP</title>
    <link rel="stylesheet" href="/styles.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-chrome-ui.css?v=20260717perf2" />
    <link rel="stylesheet" href="/css/l2-clans-page.css?v=20260718clans13" />
  </head>
  <body
    class="l2-body l2-page-city l2-city-ui-l2 l2-page-clan-hall l2-page-has-fixed-nav l2-app-l2-chrome"
  >
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-city-root">
          <div class="l2-townlive-column">
            <div id="l2-hud-panel-mount"></div>

            <div id="l2-nav-top"></div>

            <p class="err" id="clan-hall-err" hidden></p>

            <section
              class="l2-clans-main"
              data-i18n-attr="aria-label:clan_hall_section_aria"
              aria-label="КланХолл"
            >
              <div class="l2-clan-hall-panel">
                <p class="l2-clan-hall-title" data-i18n="clan_hall_title">КланХолл</p>
                <p class="l2-clan-hall-desc" data-i18n="clan_hall_desc">
                  Клан-хол надає всім учасникам клану постійне благословення.
                </p>

                <div id="clan-hall-buy-wrap" class="l2-clan-hall-buy l2-clan-hall-panel--hide">
                  <p class="l2-clan-hall-buy-label" data-i18n="clan_hall_offer">
                    «Благословення Клан-холу». Ціна 1:Adena
                  </p>
                  <button type="button" id="clan-hall-buy-btn" class="l2-clan-hall-buy-btn">
                    <span data-i18n="clan_hall_buy">[Купити]</span>
                  </button>
                </div>

                <div id="clan-hall-owned-wrap" class="l2-clan-hall-owned l2-clan-hall-panel--hide">
                  <div class="l2-clan-hall-stats-wrap">
                    <table class="l2-clan-hall-stats" id="clan-hall-stats-table">
                      <thead>
                        <tr>
                          <th data-i18n="clan_hall_col_level">Рівень клану</th>
                          <th data-i18n="clan_hall_col_patk">Фіз. атака</th>
                          <th data-i18n="clan_hall_col_matk">Маг. атака</th>
                          <th data-i18n="clan_hall_col_pdef">Фіз. захист</th>
                          <th data-i18n="clan_hall_col_mdef">Маг. захист</th>
                          <th data-i18n="clan_hall_col_hp">Макс. HP</th>
                        </tr>
                      </thead>
                      <tbody id="clan-hall-stats-body"></tbody>
                    </table>
                  </div>
                </div>
              </div>

              <p class="l2-clans-back">
                <a class="l2-clans-back__link" href="/clan-my.html" data-i18n="clan_hall_back_my"
                  >&lt;&lt; Назад до мого клану</a
                >
              </p>
            </section>

            <div id="l2-foot-links"></div>
            <div id="l2-nav-bottom"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260717perf2"></script>
    <script src="/ui-i18n.js?v=20260718clans13"></script>
    <script src="/l2-nav.js?v=20260718clans3"></script>
    <script src="/clan-hall.js?v=20260718clans13"></script>
  </body>
</html>
