<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Магазин вищей — L2WAP</title><link rel="stylesheet" href="/styles.css?v=20260709gmShopBuyOk1" />
    <link rel="stylesheet" href="/css/l2-outer-sframe.css?v=20260708globalClsAll2" />
    <link rel="stylesheet" href="/css/l2-game-chrome.css?v=20260708globalClsAll2" />
    <link rel="stylesheet" href="/css/l2-hud-panel.css?v=20260711nickWarm3" />
    <link rel="stylesheet" href="/css/l2-app-chrome-skin.css?v=20260711nickTone3" />
    <link rel="stylesheet" href="/css/l2-gm-shop-inv-skin.css?v=20260711gmShopInv7" />
  </head>
  <body class="l2-body l2-page-city l2-city-ui-l2 l2-page-gm-shop l2-page-has-fixed-nav l2-app-l2-chrome">
    <div class="l2-shell">
      <div class="l2-screen l2-outer-sframe-host">
        <div class="l2-outer-sframe" aria-hidden="true">
          <div class="l2-outer-sframe__g">
            <span class="l2-outer-sframe__n l2-outer-sframe__tl" aria-hidden="true">
              <img
                class="l2-outer-sframe__cap-tl-img"
                src="/ref/19.png"
                alt=""
                width="28"
                height="52"
                decoding="async"
              />
            </span>
            <span class="l2-outer-sframe__n l2-outer-sframe__t"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__tr"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__l"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__r"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__bl"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__b"></span>
            <span class="l2-outer-sframe__n l2-outer-sframe__br"></span>
          </div>
          <div class="l2-outer-sframe__cap-tr" role="presentation">
            <img
              class="l2-outer-sframe__cap-tr-img"
              src="/ref/18.png"
              alt=""
              width="28"
              height="52"
              decoding="async"
            />
          </div>
        </div>
        <div class="l2-game-chrome-crest" aria-hidden="true">
          <img
            class="l2-game-chrome-crest__img"
            src="/ref/2.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
        </div>
        <div class="l2-screen-inner l2-char-root">
          <div id="l2-hud-panel-mount"></div>

          <div id="l2-nav-top"></div>

          <div id="drops-shop-root" class="l2-gm-shop l2-gm-shop-card" style="width: 100%; max-width: 560px; margin: 0 auto; padding: 0 8px 20px">
            <div class="l2-gm-shop-badge">Магазин вищей</div>
            <p class="err" id="drops-shop-msg" hidden></p>
            <div id="drops-shop-meta" class="l2-gm-shop-meta"></div>
            <div id="drops-shop-mount"></div>
          </div>

          <div id="l2-foot-links"></div>

          <div id="l2-nav-bottom"></div>
        </div>
      </div>
    </div>

    <script src="/common.js?v=20260711nickWarm3"></script>
    <script src="/ui-i18n.js"></script>
    <script src="/l2-nav.js?v=20260707navChatIcon1"></script>
    <script src="/armor-set-bonuses-ui.js?v=5"></script>
    <script src="/gm-shop.js?v=20260711gmShopInv2"></script>
    <script>
      (function () {
        if (window.L2 && typeof L2.mountL2Nav === 'function') {
          L2.mountL2Nav({
            onStub: function (label) {
              var el = document.getElementById('drops-shop-msg');
              if (el) {
                el.hidden = false;
                el.textContent = '«' + label + '» — заглушка.';
              }
            },
          });
        }
        if (window.L2 && typeof L2.mountFootLinkBar === 'function') {
          L2.mountFootLinkBar('l2-foot-links', { inset: true });
        }
      })();
    </script>
  </body>
</html>
